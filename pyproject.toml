[tool.ruff]
target-version = "py311"
line-length = 120
exclude = ["frontend/", "deploy/", "docs/"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
# Type annotation strictness is enforced on new modules.
# Pre-existing large backend files are tracked for cleanup in issue #161.
disallow_untyped_defs = false

[[tool.mypy.overrides]]
# Strict checking for small, well-typed contract modules.
module = ["dispatch_contract", "remote_execution_contract"]
disallow_untyped_defs = true
strict_optional = true

[[tool.mypy.overrides]]
# Pre-existing large modules: relax strict_optional until #161 cleanup.
module = [
    "server",
    "agent_remediation",
    "workflow_stats",
    "usage_monitoring",
    "runner_autoscaler",
    "machine_registry",
    "deployment_drift",
    "report_files",
    "scheduled_workflows",
    "local_app_monitoring",
]
strict_optional = false
