# Dependabot configuration — Issue #395
#
# Strategy:
# - Weekly cadence for routine version bumps (grouped to reduce PR noise).
# - Daily cadence for security advisories — handled by a dedicated `security`
#   group with `applies-to: security-updates` so high/critical findings open
#   a PR within 24h regardless of normal schedule.
# - Major version bumps are intentionally left ungrouped so a human reviews
#   them before merge.
# - The companion auto-merge workflow (.github/workflows/dependabot-auto-merge.yml)
#   only auto-merges patch + minor updates after required checks pass.
#
# Ecosystems covered:
#   - pip (backend)            — backend/requirements.txt + pyproject.toml
#   - github-actions           — pinned action SHAs across .github/workflows
#   - docker                   — Dockerfile base image
#
# npm is intentionally NOT enabled: the frontend is a single-file SPA loaded
# from CDN with no package.json or node_modules (see CLAUDE.md "Frontend"
# section). Re-enable here if the frontend ever adopts a build step.

version: 2
updates:
  # ── Python (pip / uv) ──────────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
      - "judgement:objective"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      python-security:
        applies-to: security-updates
        patterns:
          - "*"
      python-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # Daily security-only sweep for backend Python deps. Dependabot only
  # opens a PR if a HIGH/CRITICAL advisory matches; otherwise this is a no-op.
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
      - "high"
      - "judgement:objective"
    commit-message:
      prefix: "security(deps)"
      include: "scope"
    # Security-only fast lane: ignore everything except security advisories.
    # Achieved by allowing only direct production dependencies and grouping
    # security-updates so non-security version bumps fall into the weekly
    # schedule above instead.
    allow:
      - dependency-type: "all"
    groups:
      python-security-fastlane:
        applies-to: security-updates
        patterns:
          - "*"

  # ── GitHub Actions ─────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
      - "judgement:objective"
    commit-message:
      prefix: "chore(actions)"
      include: "scope"
    groups:
      actions-security:
        applies-to: security-updates
        patterns:
          - "*"
      actions-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # Daily security sweep for GitHub Actions.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
      - "high"
      - "judgement:objective"
    commit-message:
      prefix: "security(actions)"
      include: "scope"
    groups:
      actions-security-fastlane:
        applies-to: security-updates
        patterns:
          - "*"

  # ── Docker ─────────────────────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
      - "judgement:objective"
    commit-message:
      prefix: "chore(docker)"
      include: "scope"
    groups:
      docker-security:
        applies-to: security-updates
        patterns:
          - "*"
      docker-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
      - "high"
      - "judgement:objective"
    commit-message:
      prefix: "security(docker)"
      include: "scope"
    groups:
      docker-security-fastlane:
        applies-to: security-updates
        patterns:
          - "*"
