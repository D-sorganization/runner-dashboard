# ci-secrets.yml — Secret scanning gate (issue #396)
#
# PURPOSE
#   Run gitleaks on every pull request and push to main. Hard-fail when a new
#   credential pattern is committed.
#
# COMPLEMENTS
#   - `.pre-commit-config.yaml` runs gitleaks + detect-secrets locally before
#     a commit ever reaches CI; this workflow is the second line of defence.
#   - Bandit (in `ci-standard.yml`) covers Python-only static analysis; it is
#     not a credential scanner and does not replace this job.
#
# CONVENTIONS
#   - Pinned action SHAs only (enforced by `ci-health-check`).
#   - Mandatory `timeout-minutes` and a `concurrency` group.
#   - Job runs only on the d-sorg-fleet self-hosted runners, matching the rest
#     of the dashboard CI suite.

name: CI Secrets

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks (full history scan)
    runs-on: d-sorg-fleet
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Full history is required so gitleaks can scan every commit on a
          # PR (not just the merge commit) for accidentally committed
          # credentials.
          fetch-depth: 0

      - name: Install gitleaks binary
        # Pulled from upstream releases and SHA-256 verified to keep the CI
        # path independent of the gitleaks-action license requirement for
        # GitHub orgs. Update both the version and the digest together.
        env:
          GITLEAKS_VERSION: "8.24.0"
          GITLEAKS_SHA256: "cb49b7de5ee986510fe8666ca0273a6cc15eb82571f2f14832c9e8920751f3a4"
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL "$url" -o "$RUNNER_TEMP/gitleaks.tgz"
          # Verify the archive matches the published SHA-256. If the upstream
          # release ever changes (it shouldn't), this fails closed.
          actual=$(sha256sum "$RUNNER_TEMP/gitleaks.tgz" | awk '{print $1}')
          if [ "$actual" != "$GITLEAKS_SHA256" ]; then
            echo "::warning::gitleaks tarball SHA-256 mismatch (expected $GITLEAKS_SHA256, got $actual)."
            echo "::warning::Refusing to run unverified binary. Update GITLEAKS_SHA256 in this workflow."
            exit 1
          fi
          tar -xzf "$RUNNER_TEMP/gitleaks.tgz" -C "$RUNNER_TEMP" gitleaks
          chmod +x "$RUNNER_TEMP/gitleaks"
          "$RUNNER_TEMP/gitleaks" version

      - name: Run gitleaks
        run: |
          "$RUNNER_TEMP/gitleaks" detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --report-path gitleaks-report.json \
            --report-format json \
            --exit-code 1

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.0
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 14
          if-no-files-found: ignore

  detect-secrets:
    name: detect-secrets (baseline diff)
    runs-on: d-sorg-fleet
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install detect-secrets
        run: |
          python -m venv "$RUNNER_TEMP/ds-venv"
          "$RUNNER_TEMP/ds-venv/bin/pip" install --quiet detect-secrets==1.5.0

      - name: Audit baseline integrity
        # Verifies the committed `.secrets.baseline` is consistent with the
        # current working tree: any NEW finding (not already audited in the
        # baseline) causes a non-zero exit.
        #
        # `detect-secrets scan --baseline FILE` rewrites FILE in place; the
        # generated_at timestamp and filter list are expected to drift on
        # every run, so we compare ONLY the `results` block — that is the
        # canonical record of which findings exist and where.
        run: |
          set -euo pipefail
          DS=$RUNNER_TEMP/ds-venv/bin/detect-secrets
          PY=$RUNNER_TEMP/ds-venv/bin/python

          # Snapshot the canonical `results` block from HEAD before scan.
          # Normalize path separators because detect-secrets rewrites baseline
          # filenames with platform-native separators, while CI runs on Linux
          # and some existing baselines were generated on Windows.
          "$PY" - <<'PY' > "$RUNNER_TEMP/before.json"
          import json
          from pathlib import PurePosixPath

          with open(".secrets.baseline", encoding="utf-8") as handle:
              results = json.load(handle).get("results", {})
          normalized = {}
          for filename, findings in results.items():
              key = str(PurePosixPath(filename.replace("\\", "/")))
              normalized.setdefault(key, []).extend(findings)
              for finding in normalized[key]:
                  if isinstance(finding, dict) and "filename" in finding:
                      finding["filename"] = str(PurePosixPath(finding["filename"].replace("\\", "/")))
          print(json.dumps(normalized, sort_keys=True, indent=2))
          PY

          "$DS" scan --baseline .secrets.baseline \
            --exclude-files '(package-lock\.json|uv\.lock|\.tsbuildinfo$|node_modules/|\.venv/|\.git/|\.secrets\.baseline)'

          "$PY" - <<'PY' > "$RUNNER_TEMP/after.json"
          import json
          from pathlib import PurePosixPath

          with open(".secrets.baseline", encoding="utf-8") as handle:
              results = json.load(handle).get("results", {})
          normalized = {}
          for filename, findings in results.items():
              key = str(PurePosixPath(filename.replace("\\", "/")))
              normalized.setdefault(key, []).extend(findings)
              for finding in normalized[key]:
                  if isinstance(finding, dict) and "filename" in finding:
                      finding["filename"] = str(PurePosixPath(finding["filename"].replace("\\", "/")))
          print(json.dumps(normalized, sort_keys=True, indent=2))
          PY

          if ! diff -q "$RUNNER_TEMP/before.json" "$RUNNER_TEMP/after.json" >/dev/null; then
            echo "::error::New secret-like values detected outside .secrets.baseline."
            echo "Remove the secret OR audit and re-commit the baseline:"
            echo "  detect-secrets scan --exclude-files '(package-lock\\.json|uv\\.lock|\\.tsbuildinfo\$|node_modules/|\\.venv/|\\.git/|\\.secrets\\.baseline)' > .secrets.baseline"
            echo "  detect-secrets audit .secrets.baseline"
            diff "$RUNNER_TEMP/before.json" "$RUNNER_TEMP/after.json" | head -200 || true
            exit 1
          fi
          echo "Baseline results unchanged — no new secret-shaped strings."
