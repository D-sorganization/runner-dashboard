# CI dispatch marker 2026-04-23
name: CI Standard
on:
  push:
    branches:
      - main
    paths-ignore:
      - docs/**
      - "**.md"
      - LICENSE
      - .gitignore
  pull_request:
    # NOTE: **.md intentionally NOT excluded so quality-gate runs on docs-only
    # PRs and satisfies branch protection required status checks.
    paths-ignore:
      - LICENSE
      - .gitignore
  workflow_dispatch:
    inputs:
      force_cloud:
        description: Force all runner-routed jobs onto GitHub-hosted runners
        required: false
        default: false
        type: boolean
      recovery_source_run_id:
        description: Source run ID that triggered cloud recovery
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: d-sorg-fleet
    timeout-minutes: 20
    env:
      PIP_CACHE_DIR: /home/dieterolson/actions-runners/.shared-tool-cache/pip
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
      - name: Install quality tools in isolated venv
        run: |
          python -m venv "$RUNNER_TEMP/ci-tools"
          . "$RUNNER_TEMP/ci-tools/bin/activate"
          python -m pip install --upgrade pip
          python -m pip install ruff==0.14.10 mypy==1.13.0 bandit==1.7.7
          echo "$RUNNER_TEMP/ci-tools/bin" >> "$GITHUB_PATH"
      - name: Check Tool Version Consistency
        run: |
          echo "Validating tool versions match .pre-commit-config.yaml..."
          if ! grep -q "rev: v0.14.10" .pre-commit-config.yaml; then
            echo "::error::Ruff version mismatch between CI and pre-commit config"
            exit 1
          fi
          if ! grep -q "rev: v1.13.0" .pre-commit-config.yaml; then
            echo "::error::MyPy version mismatch between CI and pre-commit config"
            exit 1
          fi
          echo "All tool versions are consistent"
      - name: Lint
        run: ruff check backend/
      - name: Check Formatting
        run: ruff format --check backend/
      - name: Install backend dependencies
        run: pip install -r requirements.txt types-PyYAML types-requests
      - name: Type Check
        run: mypy backend/ --ignore-missing-imports --exclude 'backend/__pycache__' --no-implicit-optional
      - name: Run bandit security scan
        run: bandit -r backend/ -ll -ii --exclude backend/__pycache__ -f json -o bandit-report.json || true
        continue-on-error: true  # non-blocking, report only

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 14
          if-no-files-found: ignore

      - name: Verify No Placeholders
        run: |
          if grep -rE "TODO|FIXME" backend/ --include="*.py"; then
            echo "::error::Placeholders found. Remove TODOs/FIXMEs or create tracked GitHub issues."
            exit 1
          fi
      - name: Security Audit (pip-audit)
        continue-on-error: true
        env:
          PYTHONNOUSERSITE: "1"
        run: |
          python -m venv "$RUNNER_TEMP/pip-audit-venv"
          "$RUNNER_TEMP/pip-audit-venv/bin/pip" install --quiet pip-audit
          "$RUNNER_TEMP/pip-audit-venv/bin/pip-audit" -r requirements.txt || echo "::warning::pip-audit found vulnerabilities (non-blocking)"

  security-scan:
    runs-on: d-sorg-fleet
    timeout-minutes: 20
    env:
      PIP_CACHE_DIR: /home/dieterolson/actions-runners/.shared-tool-cache/pip
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
      - name: Audit Python Dependencies
        env:
          PYTHONNOUSERSITE: "1"
        run: |
          python -m venv "$RUNNER_TEMP/security-venv"
          "$RUNNER_TEMP/security-venv/bin/pip" install --quiet pip-audit
          "$RUNNER_TEMP/security-venv/bin/pip-audit" -r requirements.txt --progress-spinner=off

  tests:
    needs:
      - quality-gate
    runs-on: d-sorg-fleet
    timeout-minutes: 30
    env:
      PIP_CACHE_DIR: /home/dieterolson/actions-runners/.shared-tool-cache/pip
    strategy:
      fail-fast: true
      matrix:
        python:
          - "3.11"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Bootstrap Python venv
        run: |
          for py in python3.11 python3.12 python3.10 python3; do
            if command -v "$py" &>/dev/null; then
              "$py" -m venv "$RUNNER_TEMP/ci-venv"
              break
            fi
          done
          source "$RUNNER_TEMP/ci-venv/bin/activate"
          pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          echo "$RUNNER_TEMP/ci-venv/bin" >> "$GITHUB_PATH"
      - name: Run Python tests
        env:
          PYTHONPATH: backend
        run: |
          if [ -d tests/ ]; then
            pytest tests/ --tb=short -q
          else
            echo "No tests directory found — skipping"
            exit 1
          fi
