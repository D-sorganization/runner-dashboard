# CI dispatch marker 2026-04-23
name: CI Standard
on:
  push:
    branches:
      - main
    paths-ignore:
      - docs/**
      - "**.md"
      - LICENSE
      - .gitignore
  pull_request:
    # NOTE: **.md intentionally NOT excluded so quality-gate runs on docs-only
    # PRs and satisfies branch protection required status checks.
    paths-ignore:
      - LICENSE
      - .gitignore
  workflow_dispatch:
    inputs:
      force_local:
        description: Force all runner-routed jobs onto GitHub-hosted runners
        required: false
        default: false
        type: boolean
      recovery_source_run_id:
        description: Source run ID that triggered cloud recovery
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # â”€â”€ Fleet-wide CI health gate (issue #154) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  ci-health-check:
    runs-on: d-sorg-fleet
    timeout-minutes: 10
    outputs:
      run_python_tests: ${{ steps.python-scope.outputs.run_python_tests }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Verify clean working tree
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Working tree is dirty. Commit or .gitignore untracked files."
            git status --short
            exit 1
          fi
          echo "Working tree clean."
      - name: Verify GitHub Actions are pinned to SHA
        run: |
          UNPINNED=$(grep -rE "uses:\s+\S+/(v[0-9]+|main|latest)" .github/workflows/ || true)
          if [ -n "$UNPINNED" ]; then
            echo "::error::Floating action versions found. Pin to SHA."
            echo "$UNPINNED"
            exit 1
          fi
          echo "All actions pinned."
      - name: verify-action-pin-uniformity
        run: |
          # Issue #390: every guarded action must resolve to a single SHA across
          # all workflows, and that SHA must carry one consistent `# vN` comment.
          fail=0
          for action in checkout setup-python setup-node github-script upload-artifact download-artifact create-github-app-token; do
            shas=$(grep -hE "uses:\s+actions/${action}@" .github/workflows/*.yml \
              | sed -E 's/.*@([0-9a-f]{40}).*/\1/' | sort -u)
            count=$(printf '%s\n' "$shas" | grep -c '^[0-9a-f]\{40\}$' || true)
            if [ "$count" -gt 1 ]; then
              echo "::error::Inconsistent SHA pinning for actions/${action}: ${shas}"
              fail=1
            fi
            comments=$(grep -hE "uses:\s+actions/${action}@" .github/workflows/*.yml \
              | sed -E 's/.*#\s*(v[^ ]+).*/\1/' | sort -u)
            ccount=$(printf '%s\n' "$comments" | grep -c '^v' || true)
            if [ "$ccount" -gt 1 ]; then
              echo "::error::actions/${action} has inconsistent version comments: ${comments}"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "All guarded actions pinned uniformly."
      - name: verify-tool-version-parity
        run: |
          # Issue #390: pyproject [dependency-groups.dev] must pin ruff/mypy
          # to the exact versions used by .pre-commit-config.yaml.
          ruff_pc=$(grep -A1 "astral-sh/ruff-pre-commit" .pre-commit-config.yaml | grep "rev:" | sed -E 's/.*rev:\s*v?//;s/\s.*//')
          mypy_pc=$(grep -A1 "pre-commit/mirrors-mypy" .pre-commit-config.yaml | grep "rev:" | sed -E 's/.*rev:\s*v?//;s/\s.*//')
          ruff_pp=$(grep -E '"ruff==' pyproject.toml | sed -E 's/.*ruff==([0-9A-Za-z.\-]+).*/\1/')
          mypy_pp=$(grep -E '"mypy==' pyproject.toml | sed -E 's/.*mypy==([0-9A-Za-z.\-]+).*/\1/')
          if [ "$ruff_pc" != "$ruff_pp" ] || [ -z "$ruff_pp" ]; then
            echo "::error::ruff version drift: pre-commit=$ruff_pc pyproject=$ruff_pp"
            exit 1
          fi
          if [ "$mypy_pc" != "$mypy_pp" ] || [ -z "$mypy_pp" ]; then
            echo "::error::mypy version drift: pre-commit=$mypy_pc pyproject=$mypy_pp"
            exit 1
          fi
          echo "ruff/mypy parity ok: ruff=$ruff_pc mypy=$mypy_pc"
      - name: Verify no source file exceeds 500 lines
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          EXEMPT="server.py|agent_remediation.py|dispatch_contract.py|agent_dispatch_router.py|credentials.py|App.tsx|queue.py|remediation.py|Queue/index.tsx|total"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "$BASE_REF"
            FILES=$(git diff --name-only "origin/${BASE_REF}...HEAD" -- backend/ frontend/src/ \
              | grep -E '\.(py|ts|tsx|js)$' \
              | grep -vE "$EXEMPT" || true)
            if [ -z "$FILES" ]; then
              echo "No changed source files require line-cap enforcement."
              exit 0
            fi
            OVER=$(printf '%s\n' "$FILES" | xargs -r wc -l | awk '$1 > 500 {print $1, $2}')
          else
            OVER=$(find backend/ frontend/src/ -type f \( -name "*.py" -o -name "*.ts" -o -name "*.tsx" -o -name "*.js" \) -exec wc -l {} + 2>/dev/null | grep -vE "$EXEMPT" | awk '$1 > 500 {print $1, $2}')
          fi
          if [ -n "$OVER" ]; then
            echo "::error::Files exceeding 500-line soft cap found:"
            echo "$OVER"
            exit 1
          fi
          echo "All source files â‰¤ 500 lines."
      - name: Determine Python validation scope
        id: python-scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "run_python_tests=true" >> "$GITHUB_OUTPUT"
            echo "Non-PR event: full Python validation required."
            exit 0
          fi

          for py in python3.12 python3.11 python3 python; do
            if command -v "$py" >/dev/null 2>&1; then
              PYTHON_BIN="$py"
              break
            fi
          done
          if [ -z "${PYTHON_BIN:-}" ]; then
            echo "::error::No Python interpreter available for PR scope detection."
            exit 1
          fi

          "$PYTHON_BIN" - <<'EOF' >> "$GITHUB_OUTPUT"
          import json
          import os
          import sys
          import urllib.request

          repo = os.environ["REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          token = os.environ["GH_TOKEN"]
          url = f"https://api.github.com/repos/{repo}/pulls/{pr_number}/files?per_page=100"
          request = urllib.request.Request(
              url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request, timeout=20) as response:
              files = [item["filename"] for item in json.load(response)]

          prefixes = ("backend/",)
          exact = {
              "pyproject.toml",
              "uv.lock",
              "requirements.txt",
              "requirements-audit-ignore.txt",
              "bandit.yaml",
              ".pre-commit-config.yaml",
          }
          run_python = any(
              path.startswith(prefixes)
              or path in exact
              for path in files
          )
          print(f"run_python_tests={'true' if run_python else 'false'}")
          print(f"changed_file_count={len(files)}", file=sys.stderr)
          EOF
      - name: Report skipped Python validation
        if: steps.python-scope.outputs.run_python_tests != 'true'
        run: echo "Skipping Python dependency bootstrap and pytest collection; this PR does not touch backend, tests, or Python dependency policy files."
      - name: Bootstrap environment
        if: steps.python-scope.outputs.run_python_tests == 'true'
        run: |
          for py in python3.11 python3.12 python3.10 python3 python; do
            if command -v "$py" &>/dev/null; then
              "$py" -m venv "$RUNNER_TEMP/health-venv"
              break
            fi
          done
          source "$RUNNER_TEMP/health-venv/bin/activate"
          pip install --upgrade pip
          pip install pytest==8.1.1
          if [ -f uv.lock ]; then
            pip install uv
            uv sync --frozen
            # Use the uv-managed venv
            echo "$(pwd)/.venv/bin" >> "$GITHUB_PATH"
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          echo "$RUNNER_TEMP/health-venv/bin" >> "$GITHUB_PATH"
      - name: Fail-fast check â€” pytest can collect tests
        if: steps.python-scope.outputs.run_python_tests == 'true'
        run: |
          if [ -f .venv/bin/activate ]; then
            source .venv/bin/activate
          fi
          if [ -d tests/ ]; then
            pytest --co -q tests/ || { echo "::error::pytest --co failed"; exit 1; }
          else
            echo "No tests directory â€” skipping collect check"
          fi

  quality-gate:
    needs: [ci-health-check]
    if: needs.ci-health-check.outputs.run_python_tests == 'true'
    runs-on: d-sorg-fleet
    timeout-minutes: 10
    env:
      PIP_CACHE_DIR: /home/dieterolson/actions-runners/.shared-tool-cache/pip
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
      - name: CODEOWNERS validity
        run: |
          test -s .github/CODEOWNERS
          grep -E '@[A-Za-z0-9-]+(/[A-Za-z0-9-]+)?' .github/CODEOWNERS > /dev/null
      - name: Install dependencies with uv
        run: |
          python -m venv "$RUNNER_TEMP/ci-tools"
          source "$RUNNER_TEMP/ci-tools/bin/activate"
          python -m pip install --upgrade pip setuptools wheel
          if [ -f uv.lock ]; then
            pip install uv
            uv sync --frozen
            echo "$(pwd)/.venv/bin" >> "$GITHUB_PATH"
          else
            pip install ruff==0.14.10 mypy==1.13.0 bandit==1.7.7
            pip install -r requirements.txt
            echo "$RUNNER_TEMP/ci-tools/bin" >> "$GITHUB_PATH"
          fi
      - name: Check Tool Version Consistency
        run: |
          echo "Validating tool versions match .pre-commit-config.yaml..."
          if ! grep -q "rev: v0.14.10" .pre-commit-config.yaml; then
            echo "::error::Ruff version mismatch between CI and pre-commit config"
            exit 1
          fi
          if ! grep -q "rev: v1.13.0" .pre-commit-config.yaml; then
            echo "::error::MyPy version mismatch between CI and pre-commit config"
            exit 1
          fi
          echo "All tool versions are consistent"
      - name: Lint
        run: ruff check backend/
      - name: Check Formatting
        run: ruff format --check backend/
      - name: Install type stubs
        run: pip install types-PyYAML types-requests
      - name: Type Check
        # disallow_untyped_defs is now true globally (pyproject.toml).
        # Per-module overrides shrink each release (tracked in #161).
        # The override count is printed to the log so it cannot grow silently.
        run: |
          OVERRIDE_COUNT=$(python - <<'EOF'
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          overrides = data.get("tool", {}).get("mypy", {}).get("overrides", [])
          relaxed_count = 0
          for override in overrides:
              if override.get("disallow_untyped_defs") is False or override.get("strict_optional") is False:
                  modules = override.get("module", [])
                  relaxed_count += len(modules) if isinstance(modules, list) else 1
          print(relaxed_count)
          EOF
          )
          echo "::notice::mypy relaxed-override module count: ${OVERRIDE_COUNT} (target: 0, tracked in #161)"
          mypy backend/ --ignore-missing-imports --exclude 'backend/__pycache__' --no-implicit-optional
      - name: Run bandit security scan
        # Blocking for HIGH severity (-lll = high severity, -i = low+ confidence).
        # MEDIUM findings are allow-listed in bandit.yaml with rationale per finding.
        # Exits non-zero on HIGH; MEDIUM/LOW are suppressed via config.
        run: |
          bandit -r backend/ -lll -i --exclude backend/__pycache__ \
            -c bandit.yaml \
            -f json -o bandit-report.json
        # HIGH severity causes exit 1 — bandit returns non-zero; do NOT add
        # continue-on-error here so the job fails on HIGH findings.

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.0
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 14
          if-no-files-found: ignore

      - name: Verify No Placeholders
        run: |
          if grep -rE "TODO|FIXME" backend/ --include="*.py"; then
            echo "::error::Placeholders found. Matches:"
            grep -rE "TODO|FIXME" backend/ --include="*.py"
            exit 1
          fi
      - name: Verify Documentation Freshness (issue #394)
        run: |
          # The frontend is now Vite + React + TypeScript. Block any
          # regression in CLAUDE.md / CONTRIBUTING.md to the old
          # "no build step / no JSX / no TypeScript" claims.
          if grep -iE 'no (build step|jsx|typescript)' CLAUDE.md CONTRIBUTING.md; then
            echo "::error::Forbidden legacy frontend phrasing reintroduced."
            echo "The frontend is Vite + React + TypeScript. Update the docs."
            exit 1
          fi
          echo "Documentation freshness check passed."
      - name: Security Audit (pip-audit)
        # Blocking for CRITICAL/HIGH CVEs.
        # Known LOW/MEDIUM CVEs are allow-listed in requirements-audit-ignore.txt
        # with rationale and expiry date per entry.
        env:
          PYTHONNOUSERSITE: "1"
        run: |
          IGNORE_FLAGS=""
          if [ -f requirements-audit-ignore.txt ]; then
            # Each non-comment line is a PURL to ignore (e.g. pkg:pypi/foo@1.0.0)
            while IFS= read -r line; do
              [[ "$line" =~ ^#.*$ || -z "$line" ]] && continue
              PURL=$(echo "$line" | awk '{print $1}')
              IGNORE_FLAGS="$IGNORE_FLAGS --ignore-vuln $PURL"
            done < requirements-audit-ignore.txt
          fi
          if [ -f uv.lock ]; then
            pip-audit --progress-spinner=off $IGNORE_FLAGS
          else
            python -m venv "$RUNNER_TEMP/pip-audit-venv"
            "$RUNNER_TEMP/pip-audit-venv/bin/pip" install --quiet pip-audit
            # shellcheck disable=SC2086
            "$RUNNER_TEMP/pip-audit-venv/bin/pip-audit" -r requirements.txt \
              --progress-spinner=off $IGNORE_FLAGS
          fi

  security-scan:
    needs: [ci-health-check]
    if: needs.ci-health-check.outputs.run_python_tests == 'true'
    runs-on: d-sorg-fleet
    timeout-minutes: 10
    env:
      PIP_CACHE_DIR: /home/dieterolson/actions-runners/.shared-tool-cache/pip
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
      - name: Audit Python Dependencies
        env:
          PYTHONNOUSERSITE: "1"
        run: |
          python -m venv "$RUNNER_TEMP/security-venv"
          source "$RUNNER_TEMP/security-venv/bin/activate"
          python -m pip install --upgrade pip setuptools wheel
          if [ -f uv.lock ]; then
            pip install uv
            uv sync --frozen
            ./.venv/bin/pip-audit --progress-spinner=off
          else
            pip install --quiet pip-audit
            pip-audit -r requirements.txt --progress-spinner=off
          fi

  tests:
    needs:
      - ci-health-check
      - quality-gate
    if: needs.ci-health-check.outputs.run_python_tests == 'true'
    runs-on: d-sorg-fleet
    timeout-minutes: 10
    env:
      PIP_CACHE_DIR: /home/dieterolson/actions-runners/.shared-tool-cache/pip
    strategy:
      fail-fast: false
      matrix:
        python:
          - "3.11"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Bootstrap Python venv
        run: |
          for py in python3.11 python3.12 python3.10 python3; do
            if command -v "$py" &>/dev/null; then
              "$py" -m venv "$RUNNER_TEMP/ci-venv"
              break
            fi
          done
          source "$RUNNER_TEMP/ci-venv/bin/activate"
          pip install --upgrade pip setuptools wheel
          if [ -f uv.lock ]; then
            pip install uv
            uv sync --frozen
            echo "$(pwd)/.venv/bin" >> "$GITHUB_PATH"
          else
            source "$RUNNER_TEMP/ci-venv/bin/activate"
            pip install --upgrade pip setuptools wheel
            pip install -r requirements.txt
            echo "$RUNNER_TEMP/ci-venv/bin" >> "$GITHUB_PATH"
          fi
      - name: Run Python tests with coverage (issue #342)
        env:
          PYTHONPATH: backend
        # -n auto: pytest-xdist parallel workers (issue #401).
        # -m exclusion: integration / playwright tests run nightly only.
        run: |
          if [ -d tests/ ]; then
            pip install pytest-cov==6.1.1 --quiet
            pytest tests/ --tb=short -n auto -m "not integration and not playwright" \
              --cov=backend --cov-report=xml --cov-report=term-missing
          else
            echo "No tests directory found â€” skipping"
            exit 0
          fi
      - name: Upload coverage artifact
        if: always() && hashFiles('coverage.xml') != ''
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.0
        with:
          name: coverage
          path: |
            coverage.xml
          retention-days: 14
          if-no-files-found: ignore
