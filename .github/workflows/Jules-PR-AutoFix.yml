name: Jules PR AutoFix (Direct Push with CI Verification)

# This workflow pushes fixes DIRECTLY to PR branches (like Cursor bugbot)
# when called by Jules Control Tower or manually dispatched by maintainers.
#
# Key features:
# 1. Centralized automatic ownership: CI failures enter via Jules Control Tower
# 2. Uses bounded REST verification and defers instead of tight check polling
# 3. Applies comprehensive fixes: ruff (lint + format), import sorting, autoflake
# 4. Mypy autofix agent: intelligent type error resolution (real fixes + targeted suppressions)
# 5. Verification gate - only marks success when CI is observed passing
# 6. Safeguards: job timeout, iteration caps, max-files-per-commit limits

on:
  workflow_call:
    inputs:
      branch:
        required: false
        type: string
        default: ""
      dry_run:
        required: false
        type: boolean
        default: false
      max_iterations:
        required: false
        type: string
        default: "5"
      source_run_id:
        required: false
        type: string
        default: ""
      failed_workflow:
        required: false
        type: string
        default: "CI Standard"
      failure_reason:
        required: false
        type: string
        default: "CI failure"
      remediation_owner:
        required: false
        type: string
        default: "Jules Control Tower"
    secrets:
      JULES_APP_ID:
        required: true
      JULES_APP_PRIVATE_KEY:
        required: true
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to fix (leave empty for auto-detect)"
        required: false
        type: string
      dry_run:
        description: "Dry run - show changes without committing"
        required: false
        default: false
        type: boolean
      max_iterations:
        description: "Maximum fix iterations (1-5)"
        required: false
        default: "5"
        type: string

permissions:
  contents: write
  pull-requests: write
  actions: read
  checks: read

# Prevent concurrent fixes on the same branch
concurrency:
  group: pr-autofix-${{ inputs.branch || github.ref_name || github.ref }}
  cancel-in-progress: false

env:
  # Maximum fix attempts per window (reduced from 10 for cost control)
  # Safety cap: never auto-fix more than MAX_FIX_ATTEMPTS iterations per run
  MAX_FIX_ATTEMPTS: 5
  FIX_WINDOW_HOURS: 4
  # Short, bounded REST verification after pushing a fix. If CI is still
  # queued/running, defer to the next workflow_run event instead of polling.
  CI_VERIFY_ATTEMPTS: 3
  CI_VERIFY_INTERVAL: 120

jobs:
  iterative-fix:
    name: Fix and Verify CI (Iterative)
    runs-on: d-sorg-fleet
    timeout-minutes: 30

    outputs:
      final_status: ${{ steps.final-status.outputs.status }}
      iterations_used: ${{ steps.final-status.outputs.iterations }}
      verification_status: ${{ steps.final-status.outputs.verification_status }}

    steps:
      - name: Generate Jules app token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v1
        with:
          app-id: ${{ secrets.JULES_APP_ID }}
          private-key: ${{ secrets.JULES_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - name: Get Branch Info
        id: branch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          INPUT_BRANCH: ${{ inputs.branch }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "$INPUT_BRANCH" ]; then
            BRANCH="$INPUT_BRANCH"
          elif [ -n "$REF_NAME" ]; then
            BRANCH="$REF_NAME"
          else
            echo "::error::Branch input is required for manual or reusable PR AutoFix runs."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Target branch: $BRANCH"

          # GUARD: Don't fix protected branches directly
          if [[ "$BRANCH" == "main" || "$BRANCH" == "master" ]]; then
            echo "Cannot auto-fix protected branch '$BRANCH'. Use hotfix workflow instead."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if this branch has an open PR
          PR_INFO=$(gh pr list --repo "${{ github.repository }}" --head "$BRANCH" --state open --json number,headRefName --jq '.[0] // empty')

          if [ -z "$PR_INFO" ]; then
            echo "No open PR found for branch '$BRANCH'. Skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          PR_NUMBER=$(echo "$PR_INFO" | jq -r '.number')
          echo "Found PR #$PR_NUMBER for branch $BRANCH"

          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Check Fix Attempt Limits
        id: limits
        if: steps.branch.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ steps.branch.outputs.branch }}
          INPUT_MAX_ITERATIONS: ${{ inputs.max_iterations }}
          REPO: ${{ github.repository }}
        run: |
          # Count recent autofix commits on this branch to prevent loops
          HOURS_AGO=$(date -u -d "$FIX_WINDOW_HOURS hours ago" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-"${FIX_WINDOW_HOURS}H" +%Y-%m-%dT%H:%M:%SZ)

          # Count commits with autofix signature in the time window
          FIX_COUNT=$(gh api "repos/$REPO/commits?sha=$BRANCH&since=$HOURS_AGO" \
            --jq '[.[] | select(.commit.message | test("\\[AutoFix\\]|Jules PR AutoFix"))] | length' 2>/dev/null || echo "0")

          echo "Found $FIX_COUNT autofix commits in last $FIX_WINDOW_HOURS hours"

          MAX_ATTEMPTS="${INPUT_MAX_ITERATIONS:-$MAX_FIX_ATTEMPTS}"

          if [ "$FIX_COUNT" -ge "$MAX_ATTEMPTS" ]; then
            echo "::warning::Max fix attempts ($MAX_ATTEMPTS) reached for branch $BRANCH. Manual intervention required."
            echo "exceeded=true" >> $GITHUB_OUTPUT
          else
            REMAINING=$((MAX_ATTEMPTS - FIX_COUNT))
            echo "remaining_attempts=$REMAINING" >> $GITHUB_OUTPUT
            echo "exceeded=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout PR Branch
        if: steps.branch.outputs.skip != 'true' && steps.limits.outputs.exceeded != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.branch.outputs.branch }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Python
        if: steps.branch.outputs.skip != 'true' && steps.limits.outputs.exceeded != 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install Fix Tools
        if: steps.branch.outputs.skip != 'true' && steps.limits.outputs.exceeded != 'true'
        run: |
          # Pin versions to match CI Standard quality gate
          pip install ruff==0.14.10 mypy==1.13.0 autoflake
          # Install project deps so mypy can resolve imports
          pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || true

      # ============================================================
      # ITERATIVE FIX LOOP - The core improvement
      # ============================================================
      - name: Iterative Fix Loop
        id: fix-loop
        if: steps.branch.outputs.skip != 'true' && steps.limits.outputs.exceeded != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ steps.branch.outputs.branch }}
          PR_NUMBER: ${{ steps.branch.outputs.pr_number }}
          MAX_ITERATIONS: ${{ steps.limits.outputs.remaining_attempts }}
          DRY_RUN: ${{ inputs.dry_run }}
          REPO: ${{ github.repository }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          FAILED_WORKFLOW: ${{ inputs.failed_workflow }}
          FAILURE_REASON: ${{ inputs.failure_reason }}
          REMEDIATION_OWNER: ${{ inputs.remediation_owner }}
          VERIFY_ATTEMPTS: ${{ env.CI_VERIFY_ATTEMPTS }}
          VERIFY_INTERVAL: ${{ env.CI_VERIFY_INTERVAL }}
        run: |
          iteration=0
          ci_passed=false
          verification_status="manual_required"
          files_modified=""
          validation_summary="ruff, autoflake, mypy-agent"

          while [ $iteration -lt $MAX_ITERATIONS ] && [ "$ci_passed" != "true" ]; do
            iteration=$((iteration + 1))
            echo ""
            echo "=========================================="
            echo "  ITERATION $iteration of $MAX_ITERATIONS"
            echo "=========================================="

            # Track changes
            CHANGES_MADE=""
            git_status_before=$(git status --porcelain | wc -l)

            # ----- STEP 0: Collect changed files for this PR -----
            echo ">>> Collecting changed files..."
            # Get base branch from PR info or default to main
            BASE_BRANCH=$(gh pr view "$PR_NUMBER" --json baseRefName --jq '.baseRefName' 2>/dev/null || echo "main")
            git fetch origin "$BASE_BRANCH" --depth=1
            CHANGED_FILES=$(git diff --diff-filter=ACMRT --name-only "origin/$BASE_BRANCH" HEAD -- '*.py' | tr '\n' ' ')
            
            if [ -z "$CHANGED_FILES" ]; then
              echo "No changed Python files found in this PR. Skipping fixes."
              break
            fi
            echo "Changed files to fix: $CHANGED_FILES"

            # ===== PHASE 1: Formatting & Linting (Scoped to changed files) =====

            # ----- FIX 1: Ruff linting + import sorting -----
            echo ">>> Running ruff check --fix (linting + import sorting)..."
            ruff check --fix $CHANGED_FILES 2>&1 || true
            if ! git diff --quiet; then
              CHANGES_MADE="$CHANGES_MADE ruff"
              git add -A
            fi

            # ----- FIX 2: Ruff formatting -----
            echo ">>> Running ruff format..."
            ruff format $CHANGED_FILES 2>&1 || true
            if ! git diff --quiet; then
              CHANGES_MADE="$CHANGES_MADE ruff-format"
              git add -A
            fi

            # ----- FIX 3: Remove unused imports -----
            echo ">>> Running autoflake..."
            for f in $CHANGED_FILES; do autoflake --in-place --remove-all-unused-imports "$f" 2>&1 || true; done 2>&1 || true
            if ! git diff --quiet; then
              CHANGES_MADE="$CHANGES_MADE autoflake"
              git add -A
            fi

            # ----- FIX 4: Re-run ruff for consistency after autoflake -----
            echo ">>> Re-running ruff (post-cleanup)..."
            ruff check --fix $CHANGED_FILES 2>&1 || true
            ruff format $CHANGED_FILES 2>&1 || true
            if ! git diff --quiet; then
              CHANGES_MADE="$CHANGES_MADE post-cleanup"
              git add -A
            fi

            # ===== PHASE 2: Mypy Agent (intelligent type error fixing) =====

            echo ">>> Running mypy autofix agent..."
            if [ -f "scripts/mypy_autofix_agent.py" ]; then
              python scripts/mypy_autofix_agent.py \
                --max-fixes 30 --max-files 20 --verbose \
                --config-file pyproject.toml $CHANGED_FILES 2>&1 || true

              if ! git diff --quiet; then
                CHANGES_MADE="$CHANGES_MADE mypy-agent"
                # Re-run ruff on mypy agent's changes for formatting consistency
                ruff check --fix $CHANGED_FILES 2>&1 || true
                ruff format $CHANGED_FILES 2>&1 || true
                git add -A
              fi
            else
              echo "  (mypy_autofix_agent.py not found, skipping mypy fixes)"
            fi

            # Check if any changes were made this iteration
            git_status_after=$(git status --porcelain | wc -l)

            if [ "$git_status_after" -gt "$git_status_before" ] || [ -n "$(git diff --staged)" ]; then
              echo "Changes made:$CHANGES_MADE"

              if [ "$DRY_RUN" == "true" ]; then
                echo "DRY RUN - would commit these changes:"
                git diff --staged --stat
                echo "iterations_used=$iteration" >> $GITHUB_OUTPUT
                echo "status=dry_run" >> $GITHUB_OUTPUT
                exit 0
              fi

              # Commit changes
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"

              git commit -m "[AutoFix] Iteration $iteration: Apply fixes ($CHANGES_MADE)

          Automated fixes applied directly to PR #$PR_NUMBER branch.
          Remediation owner: $REMEDIATION_OWNER
          Source run: ${SOURCE_RUN_ID:-manual}
          Failed workflow: $FAILED_WORKFLOW
          Failure reason: $FAILURE_REASON
          Iteration: $iteration of $MAX_ITERATIONS
          Tools used:$CHANGES_MADE

          This commit was created by Jules PR AutoFix workflow.
          CI verification loop will check if more fixes are needed.

          Co-Authored-By: Jules AutoFix <jules-bot@users.noreply.github.com>"

              # Push changes
              COMMIT_SHA=$(git rev-parse HEAD)
              files_modified=$(git diff --name-only HEAD~1 HEAD | paste -sd ', ' -)
              git push origin "$BRANCH"
              echo "Pushed iteration $iteration fixes to $BRANCH"

              echo ">>> Checking CI status with bounded REST Actions lookup..."
              verification_status="deferred"
              attempt=0
              while [ $attempt -lt "$VERIFY_ATTEMPTS" ]; do
                attempt=$((attempt + 1))
                RUN_INFO=$(gh api "repos/$REPO/actions/runs?branch=$BRANCH&per_page=20" \
                  --jq ".workflow_runs
                    | map(select(.head_sha == \"$COMMIT_SHA\" and .name == \"CI Standard\"))
                    | sort_by(.created_at)
                    | reverse
                    | .[0] // empty" 2>/dev/null || true)

                if [ -n "$RUN_INFO" ]; then
                  RUN_STATUS=$(echo "$RUN_INFO" | jq -r '.status // empty')
                  RUN_CONCLUSION=$(echo "$RUN_INFO" | jq -r '.conclusion // empty')
                  RUN_URL=$(echo "$RUN_INFO" | jq -r '.html_url // empty')
                  echo "CI Standard run status: ${RUN_STATUS:-unknown}, conclusion: ${RUN_CONCLUSION:-pending}"
                  echo "CI run: ${RUN_URL:-not available}"

                  if [ "$RUN_STATUS" = "completed" ]; then
                    if [ "$RUN_CONCLUSION" = "success" ]; then
                      echo "CI PASSED after iteration $iteration."
                      ci_passed=true
                      verification_status="passed"
                      break 2
                    fi
                    echo "CI completed with conclusion: ${RUN_CONCLUSION:-unknown}"
                    verification_status="failed"
                    break
                  fi
                else
                  echo "CI Standard run for $COMMIT_SHA not visible yet (attempt $attempt/$VERIFY_ATTEMPTS)."
                fi

                if [ $attempt -lt "$VERIFY_ATTEMPTS" ]; then
                  sleep "$VERIFY_INTERVAL"
                fi
              done

              if [ "$verification_status" = "deferred" ]; then
                echo "CI verification deferred; Control Tower will own any follow-up workflow_run failure."
                break
              fi

              # Pull any changes before next iteration
              git pull origin "$BRANCH" --rebase 2>/dev/null || true

            else
              echo "No changes made in iteration $iteration"
              # If no changes and CI still failing, we can't fix automatically
              if [ $iteration -eq 1 ]; then
                echo "::warning::No automatic fixes available. Manual intervention required."
              fi
              break
            fi
          done

          echo "iterations_used=$iteration" >> $GITHUB_OUTPUT
          echo "files_modified=${files_modified:-none}" >> $GITHUB_OUTPUT
          echo "validation=$validation_summary" >> $GITHUB_OUTPUT
          echo "verification_status=$verification_status" >> $GITHUB_OUTPUT
          if [ "$ci_passed" == "true" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          elif [ "$verification_status" == "failed" ]; then
            echo "status=manual_required" >> $GITHUB_OUTPUT
          elif [ "$verification_status" == "deferred" ]; then
            echo "status=deferred" >> $GITHUB_OUTPUT
          else
            echo "status=partial" >> $GITHUB_OUTPUT
          fi

      - name: Add PR Comment
        if: |
          steps.branch.outputs.skip != 'true' &&
          steps.limits.outputs.exceeded != 'true' &&
          steps.fix-loop.outputs.status != '' &&
          inputs.dry_run != true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.branch.outputs.pr_number }}
          STATUS: ${{ steps.fix-loop.outputs.status }}
          ITERATIONS: ${{ steps.fix-loop.outputs.iterations_used }}
          VERIFICATION_STATUS: ${{ steps.fix-loop.outputs.verification_status }}
          FILES_MODIFIED: ${{ steps.fix-loop.outputs.files_modified }}
          VALIDATION: ${{ steps.fix-loop.outputs.validation }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          FAILED_WORKFLOW: ${{ inputs.failed_workflow }}
          FAILURE_REASON: ${{ inputs.failure_reason }}
          REMEDIATION_OWNER: ${{ inputs.remediation_owner }}
        run: |
          if [ "$STATUS" == "success" ]; then
            MESSAGE="CI is now **passing** after $ITERATIONS iteration(s)!"
          elif [ "$STATUS" == "deferred" ]; then
            MESSAGE="Applied $ITERATIONS iteration(s) of fixes. CI verification is **deferred** to the next workflow_run event."
          elif [ "$STATUS" == "manual_required" ]; then
            MESSAGE="Applied $ITERATIONS iteration(s), but CI is still failing. Manual review is required."
          else
            MESSAGE="Applied $ITERATIONS iteration(s) of fixes. CI may still need manual attention."
          fi

          gh pr comment "$PR_NUMBER" --body "## AutoFix Complete

          $MESSAGE

          **Remediation owner:** $REMEDIATION_OWNER
          **Source run:** ${SOURCE_RUN_ID:-manual}
          **Failed workflow:** $FAILED_WORKFLOW
          **Failure reason:** $FAILURE_REASON
          **Iterations used:** $ITERATIONS / ${{ env.MAX_FIX_ATTEMPTS }}
          **Verification status:** $VERIFICATION_STATUS
          **Files modified:** ${FILES_MODIFIED:-none}
          **Validation:** $VALIDATION
          **Fix types applied:** ruff (lint + format), autoflake, mypy-agent

          ### What was fixed:
          - Code formatting (ruff format)
          - Linting & import sorting (ruff --fix)
          - Unused imports (autoflake)
          - Type errors (mypy autofix agent - real fixes + targeted suppressions)

          ---
          *Jules PR AutoFix with CI Verification Loop*"

      - name: Final Status
        id: final-status
        if: always()
        run: |
          echo "status=${{ steps.fix-loop.outputs.status || 'skipped' }}" >> $GITHUB_OUTPUT
          echo "iterations=${{ steps.fix-loop.outputs.iterations_used || '0' }}" >> $GITHUB_OUTPUT
          echo "verification_status=${{ steps.fix-loop.outputs.verification_status || 'not_run' }}" >> $GITHUB_OUTPUT

      - name: Generate Summary
        if: always()
        run: |
          echo "## Jules PR AutoFix Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ steps.branch.outputs.branch || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **PR:** #${{ steps.branch.outputs.pr_number || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Skipped:** ${{ steps.branch.outputs.skip }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Limit Exceeded:** ${{ steps.limits.outputs.exceeded || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Final Status:** ${{ steps.fix-loop.outputs.status || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Verification Status:** ${{ steps.fix-loop.outputs.verification_status || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Iterations Used:** ${{ steps.fix-loop.outputs.iterations_used || '0' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Files Modified:** ${{ steps.fix-loop.outputs.files_modified || 'none' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.fix-loop.outputs.status }}" == "success" ]; then
            echo "### CI Verification: PASSED" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.fix-loop.outputs.status }}" == "deferred" ]; then
            echo "### CI Verification: Deferred to workflow_run follow-up" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.fix-loop.outputs.status }}" == "manual_required" ]; then
            echo "### CI Verification: Failed, manual review required" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.fix-loop.outputs.status }}" == "partial" ]; then
            echo "### CI Verification: Partial (manual review needed)" >> $GITHUB_STEP_SUMMARY
          fi
