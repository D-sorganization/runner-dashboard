# spec-check.yml — Specification Freshness Enforcement
#
# PURPOSE: Ensures SPEC.md is updated when source files change.
# DEPLOYMENT: Copy this file to .github/workflows/spec-check.yml in each repo.
#
# HOW IT WORKS:
# 1. On pull requests, detects which files changed
# 2. If source files changed but SPEC.md did not, posts a warning
# 3. Blocks merge unless spec-exempt label is applied or SPEC.md is updated
#
# CONFIGURATION: Edit the 'source_patterns' in the Check step to match
# your repo's source directories.

name: Spec Check

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spec-freshness:
    name: Verify SPEC.md freshness
    runs-on: d-sorg-fleet
    # Skip if spec-exempt label is applied
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'spec-exempt') }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if source files changed without SPEC.md update
        id: check
        shell: bash
        run: |
          # Get the list of changed files in this PR
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Define source patterns that require spec updates
          # Customize these per repo as needed
          SOURCE_CHANGED=false
          SPEC_CHANGED=false

          while IFS= read -r file; do
            # Check if SPEC.md was modified
            if [[ "$file" == "SPEC.md" ]]; then
              SPEC_CHANGED=true
            fi

            # Check if source files were modified
            # Add or remove patterns as appropriate for your repo
            # Note: .github/workflows/ is excluded — CI-only changes rarely
            # affect documented behavior. Use spec-exempt if needed.
            if [[ "$file" == src/* ]] || \
               [[ "$file" == tests/* ]] || \
               [[ "$file" == config/* ]] || \
               [[ "$file" == pyproject.toml ]] || \
               [[ "$file" == Cargo.toml ]] || \
               [[ "$file" == CMakeLists.txt ]] || \
               [[ "$file" == package.json ]] || \
               [[ "$file" == requirements.txt ]]; then
              SOURCE_CHANGED=true
            fi
          done <<< "$CHANGED_FILES"

          echo "source_changed=$SOURCE_CHANGED" >> "$GITHUB_OUTPUT"
          echo "spec_changed=$SPEC_CHANGED" >> "$GITHUB_OUTPUT"

          if [[ "$SOURCE_CHANGED" == "true" ]] && [[ "$SPEC_CHANGED" == "false" ]]; then
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post warning comment
        if: steps.check.outputs.needs_update == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v9
        with:
          script: |
            const body = `## ⚠️ SPEC.md Update Required

            Source files were modified in this PR but \`SPEC.md\` was not updated.

            **Per the [Specification-Driven Development Policy](https://github.com/D-sorganization/Repository_Management/blob/main/docs/SPECIFICATION_DRIVEN_DEVELOPMENT_POLICY.md):**
            - Any PR that adds, removes, or changes functionality must update SPEC.md
            - Update the relevant sections (features, architecture, tests, dependencies, etc.)
            - Bump the Spec Version if making substantive changes

            **To resolve:**
            1. Update \`SPEC.md\` to reflect your changes, OR
            2. Add the \`spec-exempt\` label if this PR genuinely doesn't affect the spec (e.g., pure refactor with no behavior change)

            *This check is enforced by the spec-check CI workflow.*`;

            // Check if we already posted a comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.data.find(c =>
              c.body.includes('SPEC.md Update Required') &&
              c.user.type === 'Bot'
            );

            if (!existingComment) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Fail if spec is stale
        if: steps.check.outputs.needs_update == 'true'
        shell: bash
        run: |
          echo "::error::Source files changed but SPEC.md was not updated."
          echo "Update SPEC.md or add the 'spec-exempt' label to bypass."
          exit 1

      - name: Spec check passed
        if: steps.check.outputs.needs_update == 'false'
        shell: bash
        run: |
          echo "✅ Spec check passed."
          if [[ "${{ steps.check.outputs.spec_changed }}" == "true" ]]; then
            echo "   SPEC.md was updated alongside source changes. Good."
          elif [[ "${{ steps.check.outputs.source_changed }}" == "false" ]]; then
            echo "   No source files changed — spec update not required."
          fi
