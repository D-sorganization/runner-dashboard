# Release workflow (issues #392, #431)
#
# Supply-chain hardened release pipeline:
#   * Cosign keyless signing (OIDC / sigstore)
#   * SLSA-3 build provenance via actions/attest-build-provenance
#   * SBOM via anchore/sbom-action (syft)
#   * Conventional-commit release notes
#
# Triggers:
#   * workflow_dispatch — manual release with required `version` input.
#   * push of a semver tag (v*.*.*) — tag-driven release.
#   * push to main when `VERSION` is modified — auto-release on bump.
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semver version to release (e.g. 4.1.2). Must match VERSION file.
        required: true
        type: string
      dry_run:
        description: If true, print the would-be tag and notes but skip the release.
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*.*.*"
    branches:
      - main
    paths:
      - VERSION

permissions:
  contents: write
  id-token: write  # required for cosign OIDC and attest-build-provenance
  attestations: write  # required for actions/attest-build-provenance

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build release, sign, attest, and publish
    runs-on: d-sorg-fleet
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      AUTO_NOTES_HEADER: "Auto-generated release notes (release.yml)"
    steps:
      - name: Checkout (full history for tags)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Read VERSION file
        id: read_version
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f VERSION ]; then
            echo "::error::VERSION file not found at repo root"
            exit 1
          fi
          # Strip comments and blank lines; pick first non-empty token.
          VERSION_VALUE=$(grep -vE '^\s*(#|$)' VERSION | head -n1 | tr -d '[:space:]')
          if [ -z "$VERSION_VALUE" ]; then
            echo "::error::VERSION file is empty after stripping comments"
            exit 1
          fi
          echo "version=$VERSION_VALUE" >> "$GITHUB_OUTPUT"
          echo "Read VERSION=$VERSION_VALUE"

      - name: Resolve target version and dry-run flag
        id: resolve
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          FILE_VERSION: ${{ steps.read_version.outputs.version }}
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TARGET="$INPUT_VERSION"
            DRY="$INPUT_DRY_RUN"
          elif echo "$REF" | grep -qE '^refs/tags/v'; then
            # Tag-triggered: derive version from the tag name.
            TARGET="${REF#refs/tags/v}"
            DRY="false"
          else
            TARGET="$FILE_VERSION"
            DRY="false"
          fi
          if [ -z "$TARGET" ]; then
            echo "::error::Could not resolve target version"
            exit 1
          fi
          echo "version=$TARGET" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY" >> "$GITHUB_OUTPUT"
          echo "tag=v$TARGET" >> "$GITHUB_OUTPUT"
          echo "Resolved target version: $TARGET (dry_run=$DRY)"

      - name: Verify VERSION matches target
        shell: bash
        env:
          TARGET: ${{ steps.resolve.outputs.version }}
          FILE_VERSION: ${{ steps.read_version.outputs.version }}
        run: |
          set -euo pipefail
          if [ "$TARGET" != "$FILE_VERSION" ]; then
            echo "::error::Target version ($TARGET) does not match VERSION file ($FILE_VERSION)."
            echo "Bump VERSION first, then re-run with the matching input."
            exit 1
          fi
          echo "VERSION file matches target ($TARGET)."

      - name: Verify tag does not already exist
        shell: bash
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::error::Tag $TAG already exists locally."
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists on origin."
            exit 1
          fi
          echo "Tag $TAG is available."

      - name: Generate release notes from Conventional Commits
        id: notes
        shell: bash
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          PREV_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
            echo "Comparing against previous tag: $PREV_TAG"
          else
            RANGE=""
            echo "No previous tag found; including full history."
          fi

          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          : > "$NOTES_FILE"
          {
            echo "# $TAG"
            echo
            echo "_${AUTO_NOTES_HEADER}_"
            echo
            if [ -n "$PREV_TAG" ]; then
              echo "Changes since \`$PREV_TAG\`:"
            else
              echo "Initial tagged release."
            fi
            echo
          } >> "$NOTES_FILE"

          # Conventional commit prefixes we surface, with display headings.
          declare -A SECTIONS=(
            [feat]="### Features"
            [fix]="### Bug Fixes"
            [perf]="### Performance"
            [refactor]="### Refactors"
            [docs]="### Documentation"
            [test]="### Tests"
            [build]="### Build"
            [ci]="### CI"
            [chore]="### Chores"
            [revert]="### Reverts"
          )

          ALL_COMMITS=$(git log --pretty=format:'%H%x09%s' ${RANGE:+$RANGE} || true)

          for prefix in feat fix perf refactor docs test build ci chore revert; do
            HEADING="${SECTIONS[$prefix]}"
            MATCHES=$(echo "$ALL_COMMITS" | grep -E "	${prefix}(\([^)]+\))?!?: " || true)
            if [ -n "$MATCHES" ]; then
              echo "$HEADING" >> "$NOTES_FILE"
              echo "$MATCHES" | while IFS=$'\t' read -r SHA SUBJECT; do
                SHORT=$(echo "$SHA" | cut -c1-7)
                printf -- '- %s (%s)\n' "$SUBJECT" "$SHORT" >> "$NOTES_FILE"
              done
              echo >> "$NOTES_FILE"
            fi
          done

          if ! grep -qE '^### ' "$NOTES_FILE"; then
            echo "_No conventional-commit entries found in range._" >> "$NOTES_FILE"
            echo >> "$NOTES_FILE"
          fi

          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          echo "prev_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"
          echo "----- generated notes -----"
          cat "$NOTES_FILE"
          echo "---------------------------"

      - name: Build release tarball
        id: tarball
        if: steps.resolve.outputs.dry_run != 'true'
        shell: bash
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          set -euo pipefail
          ARTIFACT="dashboard-${VERSION}.tar.gz"
          # Exclude ephemeral / generated artefacts from the source tarball.
          tar czf "$ARTIFACT" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='venv' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='dist' \
            .
          SHA256=$(sha256sum "$ARTIFACT" | awk '{print $1}')
          echo "${SHA256}  ${ARTIFACT}" > "${ARTIFACT}.sha256"
          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "Built $ARTIFACT (sha256=$SHA256)"

      - name: Install cosign
        if: steps.resolve.outputs.dry_run != 'true'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign release artifact with cosign (keyless OIDC)
        if: steps.resolve.outputs.dry_run != 'true'
        shell: bash
        env:
          ARTIFACT: ${{ steps.tarball.outputs.artifact }}
          VERSION: ${{ steps.resolve.outputs.version }}
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          SIG_FILE="dashboard-${VERSION}.sig"
          CERT_FILE="dashboard-${VERSION}.pem"
          cosign sign-blob --yes \
            --output-signature "$SIG_FILE" \
            --output-certificate "$CERT_FILE" \
            "$ARTIFACT"
          echo "Signed $ARTIFACT → $SIG_FILE (cert: $CERT_FILE)"

      - name: Generate SBOM with syft (anchore/sbom-action)
        if: steps.resolve.outputs.dry_run != 'true'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          output-file: sbom.spdx.json
          format: spdx-json
          artifact-name: sbom.spdx.json
          upload-artifact: true

      - name: Attest build provenance (SLSA-3)
        if: steps.resolve.outputs.dry_run != 'true'
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa5fef4c7a9b # v2.3.0
        with:
          subject-path: ${{ steps.tarball.outputs.artifact }}

      - name: Dry-run summary
        if: steps.resolve.outputs.dry_run == 'true'
        shell: bash
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
          NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
        run: |
          set -euo pipefail
          echo "::notice::DRY RUN — no tag or release will be created."
          echo "Would create tag: $TAG"
          echo "Would publish release notes:"
          cat "$NOTES_FILE"

      - name: Create unsigned annotated tag
        if: steps.resolve.outputs.dry_run != 'true'
        shell: bash
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
          NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TAG_MSG_FILE="$RUNNER_TEMP/tag-message.txt"
          {
            echo "$AUTO_NOTES_HEADER"
            echo
            cat "$NOTES_FILE"
          } > "$TAG_MSG_FILE"
          git tag -a "$TAG" -F "$TAG_MSG_FILE"
          echo "Created local annotated tag $TAG."

      - name: Verify tag locally before pushing
        if: steps.resolve.outputs.dry_run != 'true'
        shell: bash
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          OBJ_TYPE=$(git cat-file -t "$TAG")
          if [ "$OBJ_TYPE" != "tag" ]; then
            echo "::error::$TAG is a $OBJ_TYPE, expected an annotated tag"
            exit 1
          fi
          MSG=$(git tag -l --format='%(contents)' "$TAG")
          if ! grep -Fq "$AUTO_NOTES_HEADER" <<< "$MSG"; then
            echo "::error::$TAG annotation missing required header: $AUTO_NOTES_HEADER"
            exit 1
          fi
          echo "Tag $TAG passed inline verification."

      - name: Push tag to origin
        if: steps.resolve.outputs.dry_run != 'true'
        shell: bash
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          git push origin "$TAG"
          echo "Pushed tag $TAG."

      - name: Create GitHub release with artifacts
        if: steps.resolve.outputs.dry_run != 'true'
        shell: bash
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
          NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          set -euo pipefail
          ARTIFACT="dashboard-${VERSION}.tar.gz"
          SIG_FILE="dashboard-${VERSION}.sig"
          CERT_FILE="dashboard-${VERSION}.pem"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "$NOTES_FILE" \
            --target "${{ github.sha }}" \
            "$ARTIFACT" \
            "${ARTIFACT}.sha256" \
            "$SIG_FILE" \
            "$CERT_FILE" \
            sbom.spdx.json
          echo "Created GitHub release $TAG with signed artifacts and SBOM."
