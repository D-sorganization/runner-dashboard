name: Agent Redundant PR Closer

# Closes redundant PRs across the multi-agent fleet by priority.
#
# When two or more open PRs in this repo reference the same issue via a
# closing keyword (Fixes|Closes|Resolves #N), the PR from the highest-
# priority agent wins and the rest are closed with a deferral comment.
# ``user``-authored PRs are never closed by automation.
#
# Priority order (see shared_scripts/agent_identity.py::PRIORITY_ORDER):
#   user > maxwell-daemon > claude > codex > jules > local > gaai
#
# Triggers:
# - Every time a PR is opened, reopened, marked ready for review,
#   synchronized, or closed (fast response to new peer PRs and unmerged
#   winner backstops)
# - Schedule every 3 hours (backstop)
# - Manual dispatch for ad-hoc runs
#
# Fail-open: a failure of this workflow does not halt agent progress.
# It only means redundancy cleanup is deferred to the next run.
#
# Back-compat: the workflow is named "Agent Redundant PR Closer" but
# preserves the previous "Jules Redundant PR Closer" identifier by
# keeping its concurrency group. Teams can still locate it in workflow
# history.

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize, closed]
  schedule:
    - cron: "0 */3 * * *" # every 3 hours
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Detect only, don't close"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      agent_filter:
        description: "Comma-separated agent ids whose PRs are eligible to close (default: all non-user)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: jules-redundant-pr-closer-${{ github.workflow }}-${{ github.repository }}
  cancel-in-progress: false

jobs:
  close-redundant:
    runs-on: d-sorg-fleet
    timeout-minutes: 10
    steps:
      - name: Check Jules app credentials
        id: app-creds
        env:
          JULES_APP_ID: ${{ secrets.JULES_APP_ID }}
          JULES_APP_PRIVATE_KEY: ${{ secrets.JULES_APP_PRIVATE_KEY }}
        run: |
          if [ -n "$JULES_APP_ID" ] && [ -n "$JULES_APP_PRIVATE_KEY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::JULES_APP_ID/JULES_APP_PRIVATE_KEY are not configured; skipping redundant PR closer."
          fi

      - name: Generate Jules app token
        id: app-token
        if: steps.app-creds.outputs.configured == 'true'
        uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # v1
        with:
          app-id: ${{ secrets.JULES_APP_ID }}
          private-key: ${{ secrets.JULES_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout Repository_Management (for scripts)
        if: steps.app-creds.outputs.configured == 'true'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          repository: D-sorganization/Repository_Management
          ref: main
          path: .jules-tools
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Python
        if: steps.app-creds.outputs.configured == 'true'
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5
        with:
          python-version: "3.11"

      - name: Close redundant agent PRs
        if: steps.app-creds.outputs.configured == 'true'
        # Fail-open: a failure here only defers redundancy cleanup; it never blocks agent work.
        # Error handling done inline via the || { exit 0 } block below.
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO_NAME: ${{ github.event.repository.name }}
          DRY_RUN_INPUT: ${{ inputs.dry_run }}
          AGENT_FILTER: ${{ inputs.agent_filter }}
          PR_ACTION: ${{ github.event.action || '' }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number || '' }}
        run: |
          set -uo pipefail
          DRY_FLAG=""
          if [ "$DRY_RUN_INPUT" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          FILTER_FLAG=""
          if [ -n "$AGENT_FILTER" ]; then
            FILTER_FLAG="--agent-filter $AGENT_FILTER"
          fi
          BACKSTOP_FLAG=""
          if [ "$PR_ACTION" = "closed" ] && [ -n "$EVENT_PR_NUMBER" ]; then
            BACKSTOP_FLAG="--backstop-pr $EVENT_PR_NUMBER"
          fi
          # Fail-open: never let a coordination glitch fail the job.
          PYTHONPATH=".jules-tools" python -m scripts.close_redundant_agent_prs \
            --repo "$REPO_NAME" \
            $DRY_FLAG \
            $FILTER_FLAG \
            $BACKSTOP_FLAG || {
              echo "::warning::redundant-PR closer exited non-zero; continuing"
              exit 0
            }

      - name: Summary
        if: always()
        env:
          REPO: ${{ github.repository }}
          TRIGGER: ${{ github.event_name }}
          DRY_RUN_DISPLAY: ${{ inputs.dry_run || 'false' }}
          AGENT_FILTER_DISPLAY: ${{ inputs.agent_filter || 'all non-user' }}
          APP_CREDS_CONFIGURED: ${{ steps.app-creds.outputs.configured || 'false' }}
        run: |
          {
            echo "## Agent Redundant PR Closer"
            echo ""
            echo "- **Repo:** $REPO"
            echo "- **Trigger:** $TRIGGER"
            echo "- **Dry run:** $DRY_RUN_DISPLAY"
            echo "- **Agent filter:** $AGENT_FILTER_DISPLAY"
            echo "- **App credentials configured:** $APP_CREDS_CONFIGURED"
          } >> "$GITHUB_STEP_SUMMARY"
