name: Frontend Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: frontend-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-scope:
    name: Determine frontend validation scope
    runs-on: d-sorg-fleet
    timeout-minutes: 5
    outputs:
      run_frontend_tests: ${{ steps.scope.outputs.run_frontend_tests }}
    steps:
      - name: Detect changed frontend surface
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "run_frontend_tests=true" >> "$GITHUB_OUTPUT"
            echo "Non-PR event: full frontend validation required."
            exit 0
          fi

          for py in python3.12 python3.11 python3 python; do
            if command -v "$py" >/dev/null 2>&1; then
              PYTHON_BIN="$py"
              break
            fi
          done
          if [ -z "${PYTHON_BIN:-}" ]; then
            echo "::error::No Python interpreter available for PR scope detection."
            exit 1
          fi

          "$PYTHON_BIN" - <<'EOF' >> "$GITHUB_OUTPUT"
          import json
          import os
          import sys
          import urllib.request

          repo = os.environ["REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          token = os.environ["GH_TOKEN"]
          url = f"https://api.github.com/repos/{repo}/pulls/{pr_number}/files?per_page=100"
          request = urllib.request.Request(
              url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request, timeout=20) as response:
              files = [item["filename"] for item in json.load(response)]

          exact = {
              "package.json",
              "package-lock.json",
              "vite.config.ts",
              "vitest.config.ts",
              "tsconfig.json",
              "tsconfig.app.json",
              "tsconfig.node.json",
          }
          run_frontend = any(path.startswith(("frontend/", "scripts/")) or path in exact for path in files)
          print(f"run_frontend_tests={'true' if run_frontend else 'false'}")
          print(f"changed_file_count={len(files)}", file=sys.stderr)
          EOF

  vitest:
    name: Vitest + Coverage
    needs: frontend-scope
    if: needs.frontend-scope.outputs.run_frontend_tests == 'true'
    runs-on: d-sorg-fleet
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: ESLint
        run: npm run lint

      - name: ts-nocheck ratchet
        run: bash scripts/check_ts_nocheck.sh

      - name: Run frontend tests with coverage
        run: npm run test:ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.0
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  playwright-e2e:
    name: Playwright E2E smoke tests
    runs-on: d-sorg-fleet
    timeout-minutes: 20
    needs:
      - frontend-scope
      - vitest
    if: needs.frontend-scope.outputs.run_frontend_tests == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install chromium --with-deps

      - name: Set up Python for backend
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Start dashboard backend
        run: |
          cd backend
          GH_TOKEN=dummy python server.py &
          echo "BACKEND_PID=$!" >> "$GITHUB_ENV"
          # Wait for backend to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8321/api/health > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run Playwright e2e smoke tests
        env:
          DASHBOARD_URL: http://localhost:8321
        run: npm run test:e2e -- --project=chromium-desktop

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.0
        with:
          name: playwright-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7
