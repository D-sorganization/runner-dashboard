name: Agent Fleet Dashboard

# Regenerates docs/fleet-in-flight.md every 15 minutes. Only commits if
# the file changed.
#
# Fail-open: if generation fails, a placeholder is written and the
# workflow completes successfully. Next run retries.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: agent-fleet-dashboard
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: d-sorg-fleet
    timeout-minutes: 15
    steps:
      - name: Generate Jules app token
        id: app-token
        uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # v1
        with:
          app-id: ${{ secrets.JULES_APP_ID }}
          private-key: ${{ secrets.JULES_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Generate dashboard
        # Fail-open: generation errors emit a warning but allow the commit step to
        # write a placeholder, so the next cron run can retry cleanly.
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          python -m scripts.generate_fleet_dashboard \
            --output docs/fleet-in-flight.md \
            || echo "::warning::dashboard generation failed; continuing"

      - name: Commit if changed
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain docs/fleet-in-flight.md)" ]; then
            git add docs/fleet-in-flight.md
            git commit -m "chore(dashboard): refresh fleet-in-flight.md"
            git push origin HEAD:main || \
              echo "::warning::could not push dashboard update; next run retries"
          else
            echo "No change to dashboard; skipping commit."
          fi

      - name: Summary
        if: always()
        run: |
          {
            echo "## Agent Fleet Dashboard"
            echo ""
            echo "- **Generated:** $(date -Iseconds)"
          } >> "$GITHUB_STEP_SUMMARY"
