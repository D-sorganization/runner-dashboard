# docker-build.yml — Build the runner-dashboard Docker image and run Trivy security scan.
# Triggered on every PR and push to main that touches relevant files.
name: Docker Build & Trivy Scan

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - requirements.lock.txt
      - requirements.txt
      - backend/**
      - frontend/**
      - config/**
  pull_request:
    paths:
      - Dockerfile
      - requirements.lock.txt
      - requirements.txt
      - backend/**
      - frontend/**
      - config/**
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build-scan:
    runs-on: d-sorg-fleet
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # v3.10.0

      - name: Build Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: false
          tags: runner-dashboard:ci-${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: runner-dashboard:ci-${{ github.sha }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          vuln-type: os,library

      - name: Upload Trivy scan results (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: runner-dashboard:ci-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@e4262713b504983e61c7728f5452be240d9385a7 # v3.26.1
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true
