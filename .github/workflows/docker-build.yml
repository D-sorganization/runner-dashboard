# docker-build.yml — Build the runner-dashboard Docker image and run Trivy security scan.
# Triggered on every PR and push to main that touches relevant files.
name: Docker Build & Trivy Scan

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - requirements.lock.txt
      - requirements.txt
      - backend/**
      - frontend/**
      - config/**
  pull_request:
    paths:
      - Dockerfile
      - requirements.lock.txt
      - requirements.txt
      - backend/**
      - frontend/**
      - config/**
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build-scan:
    runs-on: d-sorg-fleet
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5730b2e35f6f84f30ff4463ad1fc62bb0b6f71d # v3.10.0

      - name: Build Docker image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          push: false
          tags: runner-dashboard:ci-${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0 # 0.29.0
        with:
          image-ref: runner-dashboard:ci-${{ github.sha }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          vuln-type: os,library

      - name: Upload Trivy scan results (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0 # 0.29.0
        with:
          image-ref: runner-dashboard:ci-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@e4262713b504983e61c7728f5452be240d9385a7 # v3.26.1
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true
