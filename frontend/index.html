<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#0f1117" />
    <meta name="application-name" content="Fleet" />
    <meta name="apple-mobile-web-app-title" content="Fleet" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>D-sorganization Runner Dashboard</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%234f8ff7'/%3E%3Cstop offset='100%25' stop-color='%23a855f7'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='6' fill='url(%23g)'/%3E%3Cpath d='M18 6l-7 13h6l-1 7 7-13h-6z' fill='white'/%3E%3C/svg%3E"
    />
    <style>
      :root {
        --bg-primary: #0f1117;
        --bg-secondary: #161b22;
        --bg-tertiary: #1c2333;
        --bg-card: #1c2128;
        --bg-hover: #252d3a;
        --border: #30363d;
        --border-light: #3d444d;
        --text-primary: #e6edf3;
        --text-secondary: #8b949e;
        --text-muted: #6e7681;
        --accent-blue: #58a6ff;
        --accent-green: #3fb950;
        --accent-red: #f85149;
        --accent-yellow: #d29922;
        --accent-purple: #bc8cff;
        --accent-orange: #f0883e;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica,
          Arial, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        line-height: 1.5;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      #root {
        min-height: 100vh;
      }

      /* ── Header ── */
      .app-header {
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border);
        padding: 0 24px;
        display: flex;
        align-items: center;
        height: 56px;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .app-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 600;
        font-size: 16px;
        color: var(--text-primary);
        margin-right: 24px;
        white-space: nowrap;
      }
      .app-logo svg {
        width: 28px;
        height: 28px;
        flex-shrink: 0;
      }
      .tab-bar {
        display: flex;
        gap: 2px;
        height: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .tab-btn {
        background: none;
        border: none;
        color: var(--text-secondary);
        font-size: 13px;
        font-weight: 500;
        padding: 0 12px;
        cursor: pointer;
        position: relative;
        transition: color 0.15s;
        display: flex;
        align-items: center;
        gap: 5px;
        white-space: nowrap;
      }
      .tab-btn:hover {
        color: var(--text-primary);
      }
      .tab-btn.active {
        color: var(--text-primary);
      }
      .tab-btn.active::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 4px;
        right: 4px;
        height: 2px;
        background: var(--accent-blue);
        border-radius: 2px 2px 0 0;
      }
      .header-right {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--text-muted);
        flex-shrink: 0;
      }
      .header-right .section-badge {
        max-width: 150px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
      }
      .status-dot.green {
        background: var(--accent-green);
        box-shadow: 0 0 6px var(--accent-green);
      }
      .status-dot.red {
        background: var(--accent-red);
        box-shadow: 0 0 6px var(--accent-red);
      }
      .status-dot.yellow {
        background: var(--accent-yellow);
        box-shadow: 0 0 6px var(--accent-yellow);
      }

      .main-content {
        padding: 20px 24px;
        max-width: 1440px;
        margin: 0 auto;
      }

      /* ── Cards & Sections ── */
      .section {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-bottom: 16px;
        overflow: hidden;
      }
      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px;
        cursor: pointer;
        user-select: none;
        transition: background 0.15s;
      }
      .section-header:hover {
        background: var(--bg-hover);
      }
      .section-title {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        font-weight: 600;
      }
      .section-badge {
        font-size: 11px;
        font-weight: 500;
        padding: 2px 8px;
        border-radius: 10px;
        background: var(--bg-tertiary);
        color: var(--text-secondary);
      }
      .chevron {
        transition: transform 0.2s;
        color: var(--text-muted);
      }
      .chevron.open {
        transform: rotate(180deg);
      }
      .section-body {
        border-top: 1px solid var(--border);
        padding: 16px 18px;
      }
      .section-body.collapsed {
        display: none;
      }

      .stat-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 12px;
        margin-bottom: 16px;
      }
      .stat-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px;
      }
      .stat-label {
        font-size: 11px;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }
      .stat-value {
        font-size: 24px;
        font-weight: 700;
        line-height: 1.2;
      }
      .stat-sub {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 2px;
      }
      .deployment-note {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        margin: -6px 0 16px;
        font-size: 12px;
        color: var(--text-muted);
      }
      .deployment-note code {
        color: var(--text-secondary);
        background: var(--bg-tertiary);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 1px 5px;
        font-size: 11px;
      }
      .deployment-state-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 12px;
      }
      .deployment-state-machine-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 12px;
      }
      .deployment-state-machine {
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
      }
      .deployment-state-machine-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }
      .deployment-state-machine-title {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }
      .deployment-state-fields {
        display: grid;
        gap: 6px;
        margin-bottom: 10px;
      }
      .deployment-state-field {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        font-size: 12px;
      }
      .deployment-state-field span:first-child {
        color: var(--text-secondary);
      }
      .deployment-state-field code {
        font-size: 11px;
        color: var(--text-primary);
        background: var(--bg-tertiary);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 1px 5px;
        overflow-wrap: anywhere;
      }
      .deployment-preview {
        background: var(--bg-tertiary);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        margin: 12px 0;
      }
      .deployment-preview pre {
        margin: 8px 0 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 11px;
        color: var(--text-secondary);
      }
      .storage-warning {
        color: var(--accent-yellow);
      }
      .storage-critical {
        color: var(--accent-red);
      }

      .runner-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 12px;
      }
      .runner-card {
        background: var(--bg-tertiary);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .runner-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .runner-name {
        font-weight: 600;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .runner-status-badge {
        font-size: 11px;
        font-weight: 500;
        padding: 2px 8px;
        border-radius: 10px;
        text-transform: capitalize;
      }
      .runner-status-badge.online {
        background: rgba(63, 185, 80, 0.15);
        color: var(--accent-green);
      }
      .runner-status-badge.offline {
        background: rgba(248, 81, 73, 0.15);
        color: var(--accent-red);
      }
      .runner-status-badge.busy {
        background: rgba(210, 153, 34, 0.15);
        color: var(--accent-yellow);
      }
      .runner-labels {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }
      .runner-label {
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 4px;
        background: var(--bg-hover);
        color: var(--text-secondary);
        border: 1px solid var(--border);
      }
      .runner-actions {
        display: flex;
        gap: 6px;
      }

      .btn {
        font-size: 12px;
        font-weight: 500;
        padding: 5px 12px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--bg-tertiary);
        color: var(--text-primary);
        cursor: pointer;
        transition: all 0.15s;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .btn:hover {
        background: var(--bg-hover);
        border-color: var(--border-light);
      }
      .btn.btn-green {
        border-color: var(--accent-green);
        color: var(--accent-green);
      }
      .btn.btn-green:hover {
        background: rgba(63, 185, 80, 0.15);
      }
      .btn.btn-red {
        border-color: var(--accent-red);
        color: var(--accent-red);
      }
      .btn.btn-red:hover {
        background: rgba(248, 81, 73, 0.15);
      }
      .btn.btn-blue {
        border-color: var(--accent-blue);
        color: var(--accent-blue);
      }
      .btn.btn-blue:hover {
        background: rgba(88, 166, 255, 0.15);
      }
      .btn.btn-purple {
        border-color: var(--accent-purple);
        color: var(--accent-purple);
      }
      .btn.btn-purple:hover {
        background: rgba(188, 140, 255, 0.15);
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .btn-lg {
        padding: 8px 20px;
        font-size: 14px;
      }
      .fleet-controls {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .progress-bar {
        height: 8px;
        background: var(--bg-primary);
        border-radius: 4px;
        overflow: hidden;
        width: 100%;
      }
      .progress-fill {
        height: 100%;
        border-radius: 4px;
        transition: width 0.5s ease;
      }
      .progress-fill.green {
        background: var(--accent-green);
      }
      .progress-fill.yellow {
        background: var(--accent-yellow);
      }
      .progress-fill.red {
        background: var(--accent-red);
      }
      .progress-fill.blue {
        background: var(--accent-blue);
      }
      .progress-fill.purple {
        background: var(--accent-purple);
      }
      .metric-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
        font-size: 13px;
      }
      .metric-label {
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .metric-value {
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }

      .cpu-heatmap {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(34px, 1fr));
        gap: 3px;
      }
      .cpu-core {
        aspect-ratio: 1;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        transition: background 0.3s;
      }

      /* ── Tables ── */
      .data-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      .data-table th {
        text-align: left;
        padding: 8px 12px;
        font-weight: 500;
        color: var(--text-secondary);
        font-size: 12px;
        border-bottom: 1px solid var(--border);
      }
      .data-table td {
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
      }
      .data-table tr:last-child td {
        border-bottom: none;
      }
      .data-table tr:hover td {
        background: var(--bg-hover);
      }

      .conclusion-badge {
        font-size: 11px;
        font-weight: 500;
        padding: 2px 8px;
        border-radius: 10px;
        text-transform: capitalize;
      }
      .conclusion-badge.success {
        background: rgba(63, 185, 80, 0.15);
        color: var(--accent-green);
      }
      .conclusion-badge.failure {
        background: rgba(248, 81, 73, 0.15);
        color: var(--accent-red);
      }
      .conclusion-badge.cancelled {
        background: rgba(110, 118, 129, 0.15);
        color: var(--text-muted);
      }
      .conclusion-badge.in_progress {
        background: rgba(210, 153, 34, 0.15);
        color: var(--accent-yellow);
      }
      .conclusion-badge.skipped {
        background: rgba(110, 118, 129, 0.15);
        color: var(--text-muted);
      }
      .conclusion-badge.queued {
        background: rgba(88, 166, 255, 0.15);
        color: var(--accent-blue);
      }
      .queue-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
        flex-shrink: 0;
      }
      .queue-dot.active {
        background: var(--accent-yellow);
        box-shadow: 0 0 6px var(--accent-yellow);
        animation: qpulse 1.5s ease-in-out infinite;
      }
      .queue-dot.waiting {
        background: var(--accent-blue);
      }
      @keyframes qpulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      .repo-name-cell {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .repo-name-link {
        font-weight: 600;
        color: var(--accent-blue);
        text-decoration: none;
        font-size: 14px;
      }
      .repo-name-link:hover {
        text-decoration: underline;
      }
      .repo-desc {
        font-size: 12px;
        color: var(--text-muted);
        max-width: 400px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .count-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }
      .count-badge.has-items {
        color: var(--accent-blue);
      }
      .count-badge.zero {
        color: var(--text-muted);
      }
      .lang-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
      }
      .visibility-badge {
        font-size: 10px;
        font-weight: 500;
        padding: 1px 6px;
        border-radius: 10px;
        border: 1px solid var(--border);
        color: var(--text-muted);
      }

      .gpu-card {
        background: var(--bg-tertiary);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px;
        margin-top: 8px;
      }
      .gpu-name {
        font-weight: 600;
        font-size: 14px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .resource-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      .resource-table th {
        text-align: left;
        padding: 6px 10px;
        font-weight: 500;
        color: var(--text-secondary);
        font-size: 12px;
        border-bottom: 1px solid var(--border);
      }
      .resource-table td {
        padding: 6px 10px;
        border-bottom: 1px solid var(--border);
      }
      .resource-table tr:last-child td {
        border-bottom: none;
      }

      .search-bar {
        background: var(--bg-tertiary);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 12px;
        color: var(--text-primary);
        font-size: 13px;
        width: 100%;
        max-width: 300px;
        outline: none;
        transition: border-color 0.15s;
      }
      .search-bar:focus {
        border-color: var(--accent-blue);
      }
      .search-bar::placeholder {
        color: var(--text-muted);
      }
      .toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }
      .toolbar-right {
        margin-left: auto;
        display: flex;
        gap: 6px;
        align-items: center;
        flex-wrap: wrap;
      }

      .spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid var(--border);
        border-top-color: var(--accent-blue);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── Report viewer ── */
      .report-content {
        background: var(--bg-tertiary);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 20px;
        font-size: 14px;
        line-height: 1.7;
        max-height: 70vh;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      .report-content h1 {
        font-size: 20px;
        margin: 16px 0 8px;
        color: var(--accent-blue);
      }
      .report-content h2 {
        font-size: 17px;
        margin: 14px 0 6px;
        color: var(--text-primary);
        border-bottom: 1px solid var(--border);
        padding-bottom: 4px;
      }
      .report-content h3 {
        font-size: 15px;
        margin: 10px 0 4px;
        color: var(--text-secondary);
      }
      .report-content table {
        width: 100%;
        border-collapse: collapse;
        margin: 8px 0;
        font-size: 13px;
      }
      .report-content th,
      .report-content td {
        padding: 6px 10px;
        border: 1px solid var(--border);
        text-align: left;
      }
      .report-content th {
        background: var(--bg-hover);
        font-weight: 600;
      }
      .report-content code {
        background: var(--bg-hover);
        padding: 1px 4px;
        border-radius: 3px;
        font-size: 12px;
      }
      .report-content pre {
        background: var(--bg-primary);
        padding: 12px;
        border-radius: 6px;
        overflow-x: auto;
        font-size: 12px;
        margin: 8px 0;
      }
      .report-content hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 12px 0;
      }
      .report-content ul,
      .report-content ol {
        padding-left: 20px;
        margin: 6px 0;
      }
      .report-content li {
        margin: 3px 0;
      }
      .report-content strong {
        color: var(--text-primary);
      }
      .report-content a {
        color: var(--accent-blue);
      }
      .report-content blockquote {
        border-left: 3px solid var(--accent-purple);
        padding-left: 12px;
        margin: 8px 0;
        color: var(--text-secondary);
      }

      .report-list {
        list-style: none;
      }
      .report-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        transition: background 0.15s;
      }
      .report-item:hover {
        background: var(--bg-hover);
      }
      .report-item:last-child {
        border-bottom: none;
      }
      .report-item.active {
        background: var(--bg-hover);
        border-left: 3px solid var(--accent-blue);
      }
      .report-date {
        font-weight: 600;
        font-size: 14px;
      }
      .report-meta {
        font-size: 12px;
        color: var(--text-muted);
      }

      /* ── Heavy tests ── */
      .test-card {
        background: var(--bg-tertiary);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 16px;
      }
      .test-card-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 12px;
        gap: 12px;
        flex-wrap: wrap;
      }

          resource_monitoring: "Taken offline by resource monitoring",
          computer_offline: "Computer unreachable",
          dashboard_unhealthy: "Dashboard unhealthy",
          dashboard_not_deployed: "Dashboard not deployed",
          runner_service_offline: "Runner services offline",
          unknown: "Unknown",
        }[reason || "unknown"];
      }

      function visibilitySnapshot(node, onlineCount) {
        var system = node.system || {};
        var hasSystemMetrics = Object.keys(system).length > 0;
        var hasRunnerTelemetry = !!node.online || onlineCount > 0;
        if (node.offline_reason === "resource_monitoring") {
          return {
            state: "degraded",
            label: "Degraded",
            detail:
              node.offline_detail ||
              "Resource pressure is high enough to warrant attention.",
          };
        }
        if (
          hasRunnerTelemetry &&
          node.dashboard_reachable !== false &&
          hasSystemMetrics
        ) {
          return {
            state: "full_telemetry",
            label: "Full telemetry",
            detail: "Runner status and system metrics are both available.",
          };
        }
        if (hasRunnerTelemetry) {
          return {
            state: "runners_only",
            label: "Runners only",
            detail:
              onlineCount > 0
                ? "Runner registrations are healthy, but dashboard telemetry is unavailable."
                : "Runner telemetry is available, but dashboard visibility is partial.",
          };
        }
        if (node.dashboard_reachable !== false) {
          return {
            state: "dashboard_only",
            label: "Dashboard only",
            detail:
              "Dashboard is reachable, but runner registrations are offline.",
          };
        }
        return {
          state: "offline",
          label: "Offline",
          detail:
            node.offline_detail ||
            node.error ||
            "No live telemetry from this machine.",
        };
      }

      function resolveVisibility(node, onlineCount) {
        var computed = visibilitySnapshot(node, onlineCount);
        if (!node.visibility_state) return computed;
        if (
          onlineCount > 0 &&
          (node.visibility_state === "dashboard_only" ||
            node.visibility_state === "offline")
        ) {
          return computed;
        }
        return {
          state: node.visibility_state,
          label: node.visibility_label || node.visibility_state,
          detail:
            node.visibility_detail ||
            "Runner status and system metrics are available.",
        };
      }

          if (node) return Object.assign({}, node, { name: name });

      // ════════════════════════ TESTS TAB ════════════════════════
      function TestsTab(p) {
        var testRepos = p.testRepos;
        var loading = p.loading;
        var ciResults = p.ciResults || [];

        // CI rerun state per repo
        var rrs = React.useState({});
        var rerunState = rrs[0],
          setRerunState = rrs[1];

        function rerunFailed(repo, runId) {
          setRerunState(function (prev) {
            var n = Object.assign({}, prev);
            n[repo] = "running";
            return n;
          });
          fetch("/api/tests/rerun", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ repo: repo, run_id: runId }),
          })
            .then(function (r) {
              if (!r.ok) throw new Error("rerun failed");
              return r.json();
            })
            .then(function () {
              setRerunState(function (prev) {
                var n = Object.assign({}, prev);
                n[repo] = "triggered";
                return n;
              });
            })
            .catch(function () {
              setRerunState(function (prev) {
                var n = Object.assign({}, prev);
                n[repo] = "error";
                return n;
              });
            });
        }

        var conclusionColor = {
          success: "var(--accent-green)",
          failure: "var(--accent-red)",
          cancelled: "var(--text-secondary)",
          skipped: "var(--text-secondary)",
          in_progress: "var(--accent-yellow)",
          queued: "var(--accent-yellow)",
        };

        var ciSection = h(
          "div",
          { style: { marginBottom: 24 } },
          h(
            "div",
            {
              style: {
                display: "flex",
                alignItems: "center",
                gap: 8,
                marginBottom: 12,
              },
            },
            h(
              "span",
              {
                style: {
                  fontWeight: 700,
                  fontSize: 16,
                  color: "var(--text-primary)",
                },
              },
              I.activity(16),
              " CI Tests — Fleet Repos",
            ),
          ),
          ciResults.length === 0
            ? h(
                "div",
                {
                  style: {
                    color: "var(--text-secondary)",
                    fontSize: 13,
                    padding: "12px 0",
                  },
                },
                "Loading CI results…",
              )
            : h(
                "div",
                { style: { overflowX: "auto" } },
                h(
                  "table",
                  { className: "data-table" },
                  h(
                    "thead",
                    null,
                    h(
                      "tr",
                      null,
                      h("th", null, "Repo"),
                      h("th", null, "Status"),
                      h("th", null, "Branch"),
                      h("th", null, "Run #"),
                      h("th", null, "Updated"),
                      h("th", null, "Actions"),
                    ),
                  ),
                  h(
                    "tbody",
                    null,
                    ciResults.map(function (r) {
                      var concl = r.conclusion || r.status || "unknown";
                      var color = conclusionColor[concl] || "var(--text-secondary)";
                      var rerunSt = rerunState[r.repo];
                      var canRerun =
                        r.run_id &&
                        (r.conclusion === "failure" || r.conclusion === "cancelled");
                      return h(
                        "tr",
                        { key: r.repo },
                        h(
                          "td",
                          null,
                          r.html_url
                            ? h(
                                "a",
                                {
                                  href: r.html_url,
                                  target: "_blank",
                                  style: { color: "var(--accent-blue)" },
                                },
                                r.repo,
                              )
                            : r.repo,
                        ),
                        h(
                          "td",
                          null,
                          h(
                            "span",
                            {
                              className: "conclusion-badge " + concl,
                              style: { color: color },
                            },
                            concl,
                          ),
                        ),
                        h("td", null, r.head_branch || "main"),
                        h("td", null, r.run_number ? "#" + r.run_number : "—"),
                        h(
                          "td",
                          null,
                          r.updated_at
                            ? new Date(r.updated_at).toLocaleString()
                            : "—",
                        ),
                        h(
                          "td",
                          null,
                          canRerun
                            ? h(
                                "button",
                                {
                                  className: "btn btn-sm btn-blue",
                                  disabled: rerunSt === "running",
                                  onClick: function () {
                                    rerunFailed(r.repo, r.run_id);
                                  },
                                },
                                rerunSt === "running"
                                  ? h("span", { className: "spinner" })
                                  : I.play(12),
                                rerunSt === "triggered"
                                  ? " Triggered"
                                  : " Re-run Failed",
                              )
                            : r.run_id
                              ? h(
                                  "a",
                                  {
                                    href: r.html_url,
                                    target: "_blank",
                                    className: "btn btn-sm",
                                    style: { textDecoration: "none" },
                                  },
                                  "View",
                                )
                              : "—",
                        ),
                      );
                    }),
                  ),
                ),
              ),
        );
        var ds = React.useState({});
        var dispatchState = ds[0],
          setDispatchState = ds[1];

        function dispatch(repoName, method, pyVer, ref) {
          var key = repoName + "-" + method;
          setDispatchState(function (prev) {
            var n = {};
            for (var k in prev) n[k] = prev[k];
            n[key] = { status: "dispatching", output: "" };
            return n;
          });
          var url =
            method === "docker"
              ? "/api/heavy-tests/docker"
              : "/api/heavy-tests/dispatch";
          fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              repo: repoName,
              python_version: pyVer,
              ref: ref || "main",
            }),
          })
            .then(function (r) {
              return r.json();
            })
            .then(function (data) {
              setDispatchState(function (prev) {
                var n = {};
                for (var k in prev) n[k] = prev[k];
                n[key] = {
                  status: data.status || "done",
                  output: JSON.stringify(data, null, 2),
                };
                return n;
              });
            })
            .catch(function (err) {
              setDispatchState(function (prev) {
                var n = {};
                for (var k in prev) n[k] = prev[k];
                n[key] = { status: "error", output: err.message };
                return n;
              });
            });
        }

        return h(
          "div",
          null,
          ciSection,
          h(
            "div",
            {
              style: {
                borderTop: "1px solid var(--border)",
                margin: "0 0 20px 0",
                paddingTop: 20,
              },
            },
            h(
              "div",
              {
                style: {
                  fontWeight: 700,
                  fontSize: 16,
                  color: "var(--text-primary)",
                  marginBottom: 12,
                },
              },
              I.flask(16),
              " Integration Tests — Heavy Test Suite",
            ),
          ),
          h(
            "div",
            { className: "stat-row" },
            h(Stat, {
              label: "Heavy Test Repos",
              value: testRepos.length,
              sub: "with workflow_dispatch",
            }),
            h(Stat, {
              label: "Primary",
              value: "UpstreamDrift",
              sub: "MuJoCo, Drake, Pinocchio",
              color: "var(--accent-purple)",
            }),
            h(Stat, {
              label: "Methods",
              value: "2",
              sub: "GitHub Actions + Docker",
            }),
            h(Stat, {
              label: "Schedule",
              value: "Weekly",
              sub: "Sun 02:00 UTC",
            }),
          ),
          testRepos.map(function (repo) {
            var pyRef = React.useState(repo.default_python);
            var pyVer = pyRef[0],
              setPyVer = pyRef[1];
            var brRef = React.useState("main");
            var branch = brRef[0],
              setBranch = brRef[1];
            var ghKey = repo.name + "-github";
            var dkKey = repo.name + "-docker";
            var ghState = dispatchState[ghKey] || {};
            var dkState = dispatchState[dkKey] || {};

            return h(
              "div",
              { className: "test-card", key: repo.name },
              h(
                "div",
                { className: "test-card-header" },
                h(
                  "div",
                  null,
                  h(
                    "div",
                    { className: "test-card-title" },
                    I.flask(20),
                    " ",
                    repo.name,
                  ),
                  h("div", { className: "test-card-desc" }, repo.description),
                ),
              ),
              h(
                "div",
                { className: "form-row" },
                h("span", { className: "form-label" }, "Python Version:"),
                h(
                  "select",
                  {
                    className: "form-select",
                    value: pyVer,
                    onChange: function (e) {
                      setPyVer(e.target.value);
                    },
                  },
                  repo.python_versions.map(function (v) {
                    return h("option", { key: v, value: v }, v);
                  }),
                ),
              ),
              h(
                "div",
                { className: "form-row" },
                h("span", { className: "form-label" }, "Branch / Ref:"),
                h("input", {
                  className: "form-input",
                  value: branch,
                  onChange: function (e) {
                    setBranch(e.target.value);
                  },
                  placeholder: "main",
                }),
              ),
              h(
                "div",
                { className: "dispatch-actions" },
                h(
                  "button",
                  {
                    className: "btn btn-lg btn-blue",
                    disabled: ghState.status === "dispatching",
                    onClick: function () {
                      dispatch(repo.name, "github", pyVer, branch);
                    },
                  },
                  ghState.status === "dispatching"
                    ? h("span", { className: "spinner" })
                    : I.play(14),
                  " Run via GitHub Actions",
                ),
                h(
                  "button",
                  {
                    className: "btn btn-lg btn-purple",
                    disabled: dkState.status === "dispatching",
                    onClick: function () {
                      dispatch(repo.name, "docker", pyVer, branch);
                    },
                  },
                  dkState.status === "dispatching"
                    ? h("span", { className: "spinner" })
                    : I.docker(14),
                  " Run in Docker (Local)",
                ),
              ),
              ghState.output
                ? h(
                    "div",
                    null,
                    h(
                      "div",
                      {
                        style: {
                          fontSize: 12,
                          color: "var(--text-secondary)",
                          marginTop: 12,
                        },
                      },
                      "GitHub Actions: ",
                      h(
                        "span",
                        {
                          className:
                            "conclusion-badge " +
                            (ghState.status === "dispatched"
                              ? "success"
                              : ghState.status === "error"
                                ? "failure"
                                : "in_progress"),
                        },
                        ghState.status,
                      ),
                    ),
                    h("div", { className: "output-box" }, ghState.output),
                  )
                : null,
              dkState.output
                ? h(
                    "div",
                    null,
                    h(
                      "div",
                      {
                        style: {
                          fontSize: 12,
                          color: "var(--text-secondary)",
                          marginTop: 12,
                        },
                      },
                      "Docker: ",
                      h(
                        "span",
                        {
                          className:
                            "conclusion-badge " +
                            (dkState.status === "completed"
                              ? "success"
                              : dkState.status === "error" ||
                                  dkState.status === "failed"
                                ? "failure"
                                : "in_progress"),
                        },
                        dkState.status,
                      ),
                    ),
                    h("div", { className: "output-box" }, dkState.output),
                  )
                : null,

              // Recent runs
              repo.recent_runs && repo.recent_runs.length > 0
                ? h(
                    Collapse,
                    {
                      title: "Recent Heavy Test Runs",
                      icon: I.activity(14),
                      badge: repo.recent_runs.length + " runs",
                      defaultOpen: false,
                    },
                    h(
                      "div",
                      { style: { overflowX: "auto" } },
                      h(
                        "table",
                        { className: "data-table" },
                        h(
                          "thead",
                          null,
                          h(
                            "tr",
                            null,
                            h("th", null, "#"),
                            h("th", null, "Status"),
                            h("th", null, "Branch"),
                            h("th", null, "Triggered By"),
                            h("th", null, "When"),
                            h("th", null, "Link"),
                          ),
                        ),
                        h(
                          "tbody",
                          null,
                          repo.recent_runs.map(function (run) {
                            var c = run.conclusion || run.status;
                            return h(
                              "tr",
                              { key: run.id },
                              h("td", null, run.run_number),
                              h(

      // ════════════════════════ DAILY REPORTS TAB ════════════════════════
      // ════════════════════════ STATS TAB (workflow durations) ════════════════════════
      function StatsTab(p) {
        var ds = React.useState({ rows: [], window_days: 14 });
        var data = ds[0],
          setData = ds[1];
        var ls = React.useState(false);
        var loading = ls[0],
          setLoading = ls[1];
        var tss = React.useState({ series: [] });
        var timeseries = tss[0],
          setTimeseries = tss[1];
        var grp = React.useState("workflow");
        var groupBy = grp[0],
          setGroupBy = grp[1];
        var dys = React.useState(14);
        var days = dys[0],
          setDays = dys[1];
        var sel = React.useState(null);
        var selected = sel[0],
          setSelected = sel[1];

        function refresh() {
          setLoading(true);
          fetch("/api/stats/workflows?days=" + days + "&group_by=" + groupBy)
            .then(function (r) {
              return r.json();
            })
            .then(function (d) {
              setData(d || { rows: [] });
              setLoading(false);
            })
            .catch(function () {
              setLoading(false);
            });
        }
        function refreshTimeseries(row) {
          if (!row) {
            setTimeseries({ series: [] });
            return;
          }
          var params = "days=" + Math.max(days, 30) + "&bucket_hours=24";
          if (groupBy === "workflow") {
            params +=
              "&repo=" +
              encodeURIComponent(row.repo) +
              "&workflow_name=" +
              encodeURIComponent(row.workflow_name);
          } else {
            params += "&repo=" + encodeURIComponent(row.repo);
          }
          fetch("/api/stats/workflows/timeseries?" + params)
            .then(function (r) {
              return r.json();
            })
            .then(function (d) {
              setTimeseries(d || { series: [] });
            });
        }
        function collectNow() {
          setLoading(true);
          fetch("/api/stats/workflows/collect", { method: "POST" })
            .then(function (r) {
              return r.json();
            })
            .then(function () {
              refresh();
            });
        }
        React.useEffect(
          function () {
            refresh();
          },
          [days, groupBy],
        );
        React.useEffect(
          function () {
            refreshTimeseries(selected);
          },
          [selected],
        );

        function fmtDur(s) {
          if (s === null || s === undefined) return "-";
          if (s < 60) return Math.round(s) + "s";
          if (s < 3600) return (s / 60).toFixed(1) + "m";
          return (s / 3600).toFixed(1) + "h";
        }

        var rows = data.rows || [];
        var totalRuns = rows.reduce(function (a, r) {
          return a + (r.count || 0);
        }, 0);
        var avgP50 = rows.length
          ? rows.reduce(function (a, r) {
              return a + (r.p50_duration || 0);
            }, 0) / rows.length
          : 0;

        // Mini sparkline: draw p50 and p95 as SVG polylines
        function drawSparkline(series, height) {
          if (!series || series.length < 2)
            return h(
              "div",
              {
                style: {
                  color: "var(--text-muted)",
                  fontSize: 12,
                  padding: 20,
                  textAlign: "center",
                },
              },
              "Not enough data yet — collector runs every 10 minutes.",
            );
          var w = 800,
            h0 = height || 180;
          var maxD =
            Math.max.apply(
              null,
              series.map(function (s) {
                return s.p95_duration || 0;
              }),
            ) || 1;
          function xy(i, v) {
            return [
              (i / (series.length - 1)) * w,
              h0 - ((v || 0) / maxD) * (h0 - 20) - 5,
            ];
          }
          var p50 = series
            .map(function (s, i) {
              return xy(i, s.p50_duration).join(",");
            })
            .join(" ");
          var p95 = series
            .map(function (s, i) {
              return xy(i, s.p95_duration).join(",");
            })
            .join(" ");
          return h(
            "div",
            { style: { position: "relative" } },
            h(
              "svg",
              {
                viewBox: "0 0 " + w + " " + h0,
                style: {
                  width: "100%",
                  height: h0,
                  background: "rgba(63,185,80,0.02)",
                  borderRadius: 8,
                },
              },
              h("polyline", {
                points: p95,
                fill: "none",
                stroke: "var(--accent-red)",
                strokeWidth: 2,
                opacity: 0.7,
              }),
              h("polyline", {
                points: p50,
                fill: "none",
                stroke: "var(--accent-green)",
                strokeWidth: 2,
              }),
              series.map(function (s, i) {
                var c = xy(i, s.p50_duration);
                return h("circle", {
                  key: i,
                  cx: c[0],
                  cy: c[1],
                  r: 2,
                  fill: "var(--accent-green)",
                });
              }),
            ),
            h(
              "div",
              {
                style: {
                  display: "flex",
                  justifyContent: "space-between",
                  fontSize: 11,
                  color: "var(--text-muted)",
                  marginTop: 4,
                },
              },
              h("span", null, series[0].t.slice(0, 10)),
              h(
                "span",
                null,
                h("span", { style: { color: "var(--accent-green)" } }, "p50 "),
                h(
                  "span",
                  { style: { color: "var(--accent-red)", marginLeft: 8 } },
                  "p95",
                ),
              ),
              h("span", null, series[series.length - 1].t.slice(0, 10)),
            ),
          );
        }

        return h(
          "div",
          null,
          h(
            "div",
            { className: "stat-row" },
            h(Stat, {
              label: "Tracked workflows",
              value: rows.length,
              sub: (data.window_days || days) + "-day window",
            }),
            h(Stat, { label: "Completed runs", value: totalRuns }),
            h(Stat, { label: "Mean P50 duration", value: fmtDur(avgP50) }),
            h(Stat, {
              label: "Auto-refresh",
              value: "on demand",
              sub: "collector polls every 10m",
            }),
          ),

      function ReportsTab(p) {
        var reports = p.reports;

        var contentRef = React.useState(null);
        var content = contentRef[0],
          setContent = contentRef[1];
        var metricsRef = React.useState({});
        var metrics = metricsRef[0],
          setMetrics = metricsRef[1];
        var loadingReport = React.useState(false);
        var rl = loadingReport[0],
          setRl = loadingReport[1];

        function loadReport(date) {
          setSelected(date);
          setRl(true);
          fetch("/api/reports/" + date)
            .then(function (r) {
              return r.json();
            })
            .then(function (data) {
              setContent(data.content || "");
              setMetrics(data.metrics || {});
              setRl(false);

            .catch(function () {
              setContent("Failed to load report.");

        // Auto-load latest on mount

        function renderMarkdown(md) {
          if (typeof marked !== "undefined" && marked.parse) {
            var raw = marked.parse(md);
            // Sanitize via DOMPurify to prevent XSS (issue #7)
            var clean =
              typeof DOMPurify !== "undefined"
                ? DOMPurify.sanitize(raw)
                : raw;
            return { __html: clean };
          }
          // Fallback: just show raw text (HTML-escaped, inherently safe)
          return { __html: "<pre>" + md.replace(/</g, "&lt;") + "</pre>" };
        }

        // Extract key metrics for stat cards
        var prsMerged = metrics["PRs Merged (24h)"] || {};
        var issuesOpen = metrics["Issues Currently Open"] || {};

                h(

                  { className: "report-list" },
                  reports.map(function (r) {
                    return h(
                      "li",

                        key: r.date,

                        onClick: function () {
                          loadReport(r.date);

      // ════════════════════════ MACHINES TAB ════════════════════════
      function MachineCard(p) {
        var n = p.node;
        var machineRunners = p.machineRunners || [];
        var sys = n.system || {};
        var busyCount = machineRunners.filter(function (r) {
          return r.busy;
        }).length;
        var onlineCount = machineRunners.filter(function (r) {
          return r.status === "online";
        }).length;
        var visibility = resolveVisibility(n, onlineCount);
        // Machine is "live" if it has any online runners OR its dashboard is reachable.
        var isLive = !!n.online || onlineCount > 0;
        var dashboardReachable =
          n.dashboard_reachable !== false && !!sys.uptime_seconds;
        var uptimeStr = (function () {
          var s = sys.uptime_seconds;
          if (!s) return dashboardReachable ? "-" : "dashboard not deployed";
          var hr = Math.floor(s / 3600);
          var m = Math.floor((s % 3600) / 60);
          if (hr > 24) return Math.floor(hr / 24) + "d " + (hr % 24) + "h";
          return hr + "h " + m + "m";
        })();
        var mColors = {
          ControlTower: "var(--accent-purple)",
          Brick: "var(--accent-green)",
          DeskComputer: "var(--accent-blue)",
          Oglaptop: "var(--accent-orange)",
        };
        var mColor = mColors[n.name] || "var(--accent-blue)";
        var dotClass = isLive
          ? dashboardReachable
            ? "green"
            : "yellow"
          : "red";
        var offlineReason =
          n.offline_reason ||
          (!dashboardReachable && isLive
            ? "dashboard_not_deployed"
            : !isLive
              ? "unknown"
              : null);

        return h(
          "div",
          {
            className: "machine-card" + (isLive ? "" : " offline"),
            style: { borderLeft: "3px solid " + mColor },
          },
          h(
            "div",
            { className: "machine-card-header" },
            h(
              "div",
              { className: "machine-name" },
              h("span", { className: "status-dot " + dotClass }),
              n.name,
            ),
            h(
              "div",
              { className: "machine-badges" },
              h(
                "span",
                { className: "role-badge " + (n.role || "node") },
                n.role || "node",
              ),
              h(
                "span",
                {
                  className:
                    "telemetry-badge " + (visibility.state || "offline"),
                  title: visibility.detail,
                },
                visibility.label,
              ),
              n.is_local
                ? h(
                    "span",
                    {
                      className: "role-badge",
                      style: {
                        background: "rgba(63,185,80,0.1)",
                        color: "var(--accent-green)",
                        border: "1px solid rgba(63,185,80,0.3)",
                      },
                    },
                    "this machine",
                  )
                : null,
              h(
                "span",
                { style: { color: "var(--text-muted)", fontSize: 12 } },
                "Uptime: " + uptimeStr,

            ),
          ),

          // Runners summary
          h(
            "div",
            {
              className: "machine-runners",
              style: { flexDirection: "column", alignItems: "stretch", gap: 6 },
            },
            h(
              "div",
              {
                style: {
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                },
              },
              h(
                "span",
                {
                  style: {
                    color: "var(--text-secondary)",
                    fontSize: 13,
                    fontWeight: 600,
                  },
                },
                "Runners (" + onlineCount + " online, " + busyCount + " busy)",
              ),
            ),
            machineRunners.length > 0
              ? h(
                  "div",
                  {
                    style: {
                      display: "flex",
                      flexWrap: "wrap",
                      gap: 4,
                      marginTop: 4,
                    },
                  },
                  machineRunners.map(function (r) {
                    var color = r.busy
                      ? "var(--accent-yellow)"
                      : r.status === "online"
                        ? "var(--accent-green)"
                        : "var(--accent-red)";
                    var label = r.name.split("-").pop();
                    var title =
                      r.name +
                      (r.busy
                        ? " (busy)"

                          ? " (idle)"

                    return h(

                        key: r.id,
                        title: title,

                          fontSize: 11,

                          border: "1px solid " + color + "44",

          // Full system resources panel
          h(
            "div",
            {
              style: {

                borderTop: "1px solid var(--border)",

      function DeploymentTab(p) {
        var data = p.data || {};
        var loading = p.loading;
        var onRefresh = p.onRefresh || function () {};
        var onOpenFleet = p.onOpenFleet || function () {};
        var previewState = React.useState(null);
        var preview = previewState[0],
          setPreview = previewState[1];
        var rollout = data.rollout_state || {};
        var machines = (data.machines || []).slice().sort(function (a, b) {
          var priority = {
            dirty: 0,
            offline: 1,
            drifted: 2,
            degraded: 3,
            unknown: 4,
            steady: 5,
          };
          var ap =
            priority[a.rollout_state] != null ? priority[a.rollout_state] : 9;
          var bp =
            priority[b.rollout_state] != null ? priority[b.rollout_state] : 9;
          if (ap !== bp) return ap - bp;
          return (a.display_name || a.name || "").localeCompare(
            b.display_name || b.name || "",
          );
        });

        function renderVersion(value) {
          return value && value !== "unknown" ? value : "unknown";
        }

        function refreshAfterAction() {
          onRefresh();
          setTimeout(onRefresh, 1500);
        }

        function previewUpdate(machine) {
          if (!machine || !machine.name) return;
          setPreview({
            loading: true,
            machine: machine,
            title: "Loading dry-run preview...",
          });
          fetch("/api/deployment/update-signal", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              node: machine.name,
              reason: "dashboard-ui",
              dry_run: true,
            }),
          })
            .then(function (r) {
              return r.json();
            })
            .then(function (d) {
              setPreview({
                loading: false,
                machine: machine,
                preview: d.preview || null,
                drift: d.drift || null,
                dryRun: true,
              });
            })
            .catch(function () {
              setPreview({
                loading: false,
                machine: machine,
                error: "Dry-run preview failed.",
              });
            });
        }

        function confirmUpdate() {
          if (!preview || !preview.machine) return;
          var machine = preview.machine;
          setPreview(
            Object.assign({}, preview, {
              loading: true,
              confirming: true,
            }),
          );
          fetch("/api/deployment/update-signal", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              node: machine.name,
              reason: "dashboard-ui",
            }),
          })
            .then(function (r) {
              return r.json();
            })
            .then(function (d) {
              setPreview({
                loading: false,
                machine: machine,
                result: d.event || null,
                drift: d.drift || null,
                confirmed: true,
              });
              refreshAfterAction();
            })
            .catch(function () {
              setPreview({
                loading: false,
                machine: machine,
                error: "Update signal failed.",
              });
            });
        }

        var attentionCount = rollout.machines_attention || 0;
        var onlineCount = rollout.machines_online || 0;
        var totalCount = rollout.machines_total || machines.length;
        return h(
          "div",
          null,
          h(
            "div",
            { className: "stat-row" },
            h(Stat, {
              label: "Rollout",
              value: rollout.status || "unknown",
              color:
                rollout.status === "stable"
                  ? "var(--accent-green)"
                  : rollout.status === "blocked"
                    ? "var(--accent-red)"
                    : rollout.status === "degraded"
                      ? "var(--accent-yellow)"
                      : "inherit",
              sub: rollout.summary || "Deployment state across the fleet",
            }),
            h(Stat, {
              label: "Attention",
              value: attentionCount,
              color: attentionCount > 0 ? "var(--accent-yellow)" : "inherit",
              sub: "offline, drifting, dirty, or unknown machines",
            }),
            h(Stat, {
              label: "Online",
              value: onlineCount + "/" + totalCount,
              color:
                totalCount > 0 && onlineCount === totalCount
                  ? "var(--accent-green)"
                  : "var(--accent-yellow)",
              sub: "machines reporting dashboard telemetry",
            }),
            h(Stat, {
              label: "Expected",
              value: renderVersion(data.expected_version),
              sub: "hub VERSION target",
            }),
            h(Stat, {
              label: "Current",
              value: renderVersion((data.drift || {}).current),
              sub: (data.drift || {}).message || "current deployment",
            }),
          ),
          h(
            "div",
            { className: "deployment-note" },
            h("span", null, "Deployment state for"),
            h(
              "code",
              null,
              renderVersion(
                (data.drift || {}).expected || data.expected_version,
              ),
            ),
            h(
              "button",
              {
                className: "btn",
                style: { padding: "0 8px", fontSize: 11, height: 22 },
                onClick: onOpenFleet,
              },
              "Fleet overview",
            ),
            loading ? h("span", null, "Loading...") : null,
          ),
          preview
            ? h(
                "div",
                { className: "deployment-preview" },
                h(
                  "div",
                  {
                    style: {
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "space-between",
                      gap: 12,
                      flexWrap: "wrap",
                    },
                  },
                  h(
                    "strong",
                    null,
                    preview.loading
                      ? "Building dry-run preview"
                      : preview.confirmed
                        ? "Update signal sent"
                        : preview.error
                          ? "Preview error"
                          : "Dry-run preview",
                  ),
                  h(
                    "div",
                    { style: { display: "flex", gap: 8, flexWrap: "wrap" } },
                    preview.preview && !preview.confirmed && !preview.error
                      ? h(
                          "button",
                          { className: "btn", onClick: confirmUpdate },
                          "Confirm update",
                        )
                      : null,
                    h(
                      "button",
                      {
                        className: "btn",
                        onClick: function () {
                          setPreview(null);
                        },
                      },
                      "Clear",
                    ),
                  ),
                ),
                h(
                  "pre",
                  null,
                  preview.error
                    ? preview.error
                    : JSON.stringify(
                        preview.preview ||
                          preview.drift ||
                          preview.result ||
                          {},
                        null,
                        2,
                      ),
                ),
              )
            : null,
          h(
            "div",
            { className: "deployment-state-machine-list" },
            machines.map(function (machine) {
              var drift = machine.drift_status || {};
              var statusTone =
                machine.rollout_state === "steady"
                  ? "var(--accent-green)"
                  : machine.rollout_state === "dirty" ||
                      machine.rollout_state === "offline"
                    ? "var(--accent-red)"

      function MachinesTab(p) {
        var d = p.data || {};
        var loading = p.loading;
        var allRunners = p.runners || [];
        var nodes = d.nodes || [];
        var online = d.online_count || 0;
        // Group runners by machine name
        var runnersByMachine = {};
        allRunners.forEach(function (r) {
          var machine = parseRunnerName(r.name).machine;
          if (!runnersByMachine[machine]) runnersByMachine[machine] = [];
          runnersByMachine[machine].push(r);
        });
        Object.keys(runnersByMachine).forEach(function (name) {
          runnersByMachine[name] = runnersByMachine[name]
            .slice()
            .sort(runnerSort);
        });
        var totalBusy = allRunners.filter(function (r) {
          return r.busy;
        }).length;
        var totalOnline = allRunners.filter(function (r) {
          return r.status === "online";
        }).length;

        // Build machine list from runners even if fleet nodes aren't reachable.
        // Runner names are title-case (e.g. "Brick") but FLEET_NODES keys are
        // lowercase — match case-insensitively.
        var machineNames = Object.keys(runnersByMachine).sort(function (a, b) {
          return a === "ControlTower"
            ? -1
            : b === "ControlTower"
              ? 1
              : a.localeCompare(b);
        });
        var nodesByName = {};
        nodes.forEach(function (n) {
          nodesByName[canonicalMachineName(n.name).toLowerCase()] = n;
        });

        // Ensure every machine with runners has a node entry (even if dashboard unreachable)
        var allNodes = machineNames.map(function (name) {
          var node = nodesByName[name.toLowerCase()];
          if (node) {
            // Use runner-derived display name (title-case) and preserve backend fields
            return Object.assign({}, node, { name: name });
          }
          // Create a stub node from runner data (no backend entry at all)
          var mrs = runnersByMachine[name] || [];
          var mOnline = mrs.filter(function (r) {
            return r.status === "online";
          }).length;
          return {
            name: name,
            url: "",
            online: mOnline > 0,
            dashboard_reachable: false,
            is_local: false,
            role: "node",
            system: {},
            health: { runners_registered: mrs.length },
            last_seen: null,
            offline_reason:
              mOnline > 0 ? "dashboard_not_deployed" : "runner_service_offline",
            offline_detail:

              mOnline > 0
                ? "Dashboard not deployed on this machine — runners are healthy, but per-machine system metrics are unavailable. See docs/dashboard_deployment_guide.md for install steps."
                : "Offline",
          };

        var gpuNodes = allNodes.filter(function (n) {
          return n.online && n.system && n.system.gpu && n.system.gpu.count > 0;
        });

        return h(
          "div",
          null,
          h(
            "div",
            { className: "stat-row" },
            h(Stat, {
              label: "Machines",
              value: allNodes.length,

                " online",

                allNodes.every(function (n) {

                  : "var(--accent-yellow)",

            h(Stat, {
              label: "Total Runners",
              value: allRunners.length,

            }),
            h(Stat, {
              label: "GPU Nodes",
              value: gpuNodes.length,
              color: gpuNodes.length > 0 ? "var(--accent-purple)" : "inherit",
              sub:
                gpuNodes
                  .map(function (n) {
                    return n.name;

            }),
            h(Stat, {
              label: "Auto-refresh",
              value: "60s",
              sub: "fleet metrics",

                    key: n.name,
                    node: n,

                  });
                }),

            : null,
        );

      // ════════════════════════ LOCAL APPS TAB ════════════════════════
      function localAppHasUpdateAvailable(a) {
        return a.drift && a.drift.behind > 0 && a.drift.ahead === 0;

      function localAppUnhealthy(a) {
        return a.health && a.health.available && a.health.ok === false;

      // ════════════════════════ QUEUE TAB ════════════════════════
      function QueueTab(p) {
        var q = p.queue || {};
        var loading = p.loading;
        var onRefresh = p.onRefresh;
        var ip = q.in_progress || [];
        var qu = q.queued || [];
        var ds = React.useState(null);
        var diag = ds[0],
          setDiag = ds[1];
        var dl = React.useState(false);
        var diagLoading = dl[0],
          setDiagLoading = dl[1];
        var cs = React.useState({});
        var cancelling = cs[0],
          setCancelling = cs[1];
        // Two-step inline confirmation state for destructive actions (issue #7)
        var cwcs = React.useState(null);
        var confirmWorkflow = cwcs[0],
          setConfirmWorkflow = cwcs[1];
        var crcs = React.useState(null);
        var confirmRun = crcs[0],
          setConfirmRun = crcs[1];
        function elapsed(r) {
          var start = r.run_started_at || r.created_at;
          if (!start) return "-";
          return formatDuration(
            Math.round((Date.now() - new Date(start).getTime()) / 1000),
          );
        }
        function waited(r) {
          if (!r.created_at) return "-";
          var s = Math.round(
            (Date.now() - new Date(r.created_at).getTime()) / 1000,
          );
          return formatDuration(s);
        }
        function waitColor(r) {
          var s = Math.round(
            (Date.now() - new Date(r.created_at || 0).getTime()) / 1000,
          );
          return s > 300
            ? "var(--accent-red)"
            : s > 60
              ? "var(--accent-yellow)"
              : "inherit";
        }
        function runDiagnose() {
          setDiagLoading(true);
          setDiag(null);
          fetch("/api/queue/diagnose")
            .then(function (r) {
              return r.json();
            })
            .then(function (d) {
              setDiag(d);
              setDiagLoading(false);
            })
            .catch(function () {
              setDiagLoading(false);
            });
        }
        function cancelRun(repo, runId) {
          var key = repo + "/" + runId;
          setCancelling(function (prev) {
            var n = Object.assign({}, prev);
            n[key] = "pending";
            return n;
          });
          fetch("/api/runs/" + repo + "/cancel/" + runId, { method: "POST" })
            .then(function (r) {
              return r.json();
            })
            .then(function () {
              setCancelling(function (prev) {
                var n = Object.assign({}, prev);
                n[key] = "done";
                return n;
              });
              if (onRefresh) setTimeout(onRefresh, 1500);
            })
            .catch(function () {
              setCancelling(function (prev) {
                var n = Object.assign({}, prev);
                n[key] = "error";
                return n;
              });
            });
        }
        function cancelWorkflow(workflowName, repo) {
          // Two-step inline confirmation: first call arms, second call fires (issue #7)
          var key = workflowName + (repo ? "/" + repo : "");
          if (confirmWorkflow !== key) {
            setConfirmWorkflow(key);
            setTimeout(function () {
              setConfirmWorkflow(function (cur) {
                return cur === key ? null : cur;
              });
            }, 5000);
            return;
          }
          setConfirmWorkflow(null);
          fetch("/api/queue/cancel-workflow", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              workflow_name: workflowName,
              repo: repo || null,
            }),
          })
            .then(function (r) {
              return r.json();
            })
            .then(function (d) {
              alert(
                "Cancelled " +
                  d.cancelled_count +
                  " run(s)" +
                  (d.errors && d.errors.length > 0
                    ? "\nErrors: " + d.errors.join(", ")
                    : ""),
              );
              if (onRefresh) setTimeout(onRefresh, 1500);
            })
            .catch(function () {
              alert("Cancel request failed");
            });
        }
        // Group queued runs by workflow name for bulk-cancel
        var workflowGroups = {};
        qu.forEach(function (r) {
          var n = r.name || "?";
          if (!workflowGroups[n]) workflowGroups[n] = [];
          workflowGroups[n].push(r);
        });
        var bulkTargets = Object.keys(workflowGroups).filter(function (n) {
          return workflowGroups[n].length > 1;
        });
        return h(
          "div",
          null,
          h(
            "div",
            { className: "stat-row" },
            h(Stat, {
              label: "In Progress",
              value: ip.length,
              color: ip.length > 0 ? "var(--accent-yellow)" : "inherit",
              sub: ip.length > 0 ? "actively running" : "idle",
            }),
            h(Stat, {
              label: "Queued",
              value: qu.length,
              color: qu.length > 0 ? "var(--accent-blue)" : "inherit",
              sub: qu.length > 0 ? "waiting for runner" : "empty",
            }),
            h(Stat, {
              label: "Total Active",
              value: q.total || 0,
              sub: "across all repos",
            }),
            h(Stat, {
              label: "Auto-refresh",
              value: "15s",
              sub: "updates automatically",
            }),
          ),
          qu.length > 0
            ? h(
                "div",
                { style: { padding: "0 0 12px 0" } },
                h(
                  "button",
                  {
                    className: "btn",
                    onClick: runDiagnose,
                    disabled: diagLoading,
                    style: { marginRight: 8 },
                  },
                  diagLoading ? h("span", { className: "spinner" }) : "🔍",
                  " Why are jobs waiting?",
                ),
                diag &&
                  h(
                    "div",
                    {
                      style: {
                        marginTop: 10,
                        padding: "12px 16px",
                        background: "var(--bg-secondary)",
                        borderRadius: 8,
                        border: "1px solid var(--border)",
                      },
                    },
                    h(
                      "div",
                      {
                        style: {
                          fontWeight: 600,
                          marginBottom: 6,
                          color:
                            diag.pick_runner_misconfig &&
                            diag.pick_runner_misconfig.length > 0
                              ? "var(--accent-red)"
                              : diag.runner_groups_restricted &&
                                  diag.waiting_for_generic_self_hosted > 0
                                ? "var(--accent-red)"
                                : diag.waiting_for_self_hosted > 0 &&
                                    diag.runner_pool &&
                                    diag.runner_pool.idle === 0
                                  ? "var(--accent-yellow)"
                                  : diag.waiting_for_github_hosted > 0
                                    ? "var(--accent-blue)"
                                    : "var(--accent-green)",
                        },
                      },
                      diag.bottleneck,
                    ),
                    h(
                      "div",
                      {
                        style: {
                          display: "flex",
                          gap: 16,
                          marginTop: 8,
                          flexWrap: "wrap",
                        },
                      },
                      h(
                        "span",
                        { style: { fontSize: 12, color: "var(--text-muted)" } },
                        "Fleet runners — ",

          if (filter === "cancelled") return r.conclusion === "cancelled";
          return true;
        });
        function dur(r) {
          if (!r.run_started_at || !r.updated_at) return "-";
          var ms = new Date(r.updated_at) - new Date(r.run_started_at);
          var s = Math.floor(ms / 1000);
          if (s < 60) return s + "s";
          var m = Math.floor(s / 60);
          if (m < 60) return m + "m " + (s % 60) + "s";
          return Math.floor(m / 60) + "h " + (m % 60) + "m";
        }
        function ago(d) {
          if (!d) return "-";
          var s = Math.floor((Date.now() - new Date(d)) / 1000);
          if (s < 60) return s + "s ago";
          var m = Math.floor(s / 60);
          if (m < 60) return m + "m ago";

            schedules: schedules.map(function (entry, i) {
              if (i !== index) return entry;
